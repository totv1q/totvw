<style>
/* ═══════════ RESET & ROOT ═══════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
:root{
  --gold:#F5C518;--gold-l:#FFD740;--gold-d:#FFAB00;--gold-bg:rgba(245,197,24,.08);--gold-bg2:rgba(245,197,24,.16);
  --accent:#F5C518;
  --red:#E53935;--red-bg:rgba(229,57,53,.12);
  --bg:#050505;--bg2:#0C0C0C;--surface:#141414;--card:#1C1C1C;--card-h:#242424;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --txt:#F0F0F0;--txt2:#B3B3B3;--grey:#888;--dim:#4A4A4A;
  --glass:rgba(255,255,255,.06);--glass-b:rgba(255,255,255,.1);
  --r:8px;--r2:12px;--r3:18px;--r4:24px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --nav-h:56px;--tab-h:52px;
}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{font-family:'Cairo','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100%;position:fixed;width:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none;direction:rtl}

/* ═══════════ SPLASH ═══════════ */
#splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .7s,visibility .7s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{animation:sp-pulse 2s ease-in-out infinite}
@keyframes sp-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.sp-bar-wrap{width:160px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sp-bar{width:0;height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));border-radius:3px;animation:sp-load 2.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes sp-load{0%{width:0}60%{width:70%}100%{width:100%}}
.sp-txt{font-size:.72rem;color:var(--dim);letter-spacing:2px}

/* ═══════════ PWA INSTALL BANNER ═══════════ */
#installBanner{position:fixed;bottom:0;left:0;right:0;z-index:8000;padding:12px 16px calc(var(--sb)+12px);background:rgba(5,5,5,.97);border-top:1px solid var(--border2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;gap:12px;animation:slideUp .35s ease}
#installBanner.show{display:flex}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.ib-logo{width:44px;height:44px;border-radius:10px;flex-shrink:0}
.ib-txt{flex:1;min-width:0}
.ib-title{font-size:.85rem;font-weight:700}
.ib-sub{font-size:.7rem;color:var(--grey)}
.ib-btn{background:linear-gradient(135deg,var(--gold-l),var(--gold-d));color:#000;border:none;border-radius:var(--r);padding:9px 16px;font-size:.78rem;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ib-close{background:transparent;border:none;color:var(--grey);font-size:1.2rem;cursor:pointer;padding:4px;flex-shrink:0}

/* ═══════════ LOCK SCREEN ═══════════ */
.screen{display:none;min-height:100svh;align-items:center;justify-content:center;padding:20px;position:fixed;inset:0;z-index:200}
.screen.on{display:flex}
#lockScreen{background:#000;background-image:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.06) 0%,transparent 60%);padding-top:calc(var(--st)+20px);padding-bottom:calc(var(--sb)+20px)}
.lk-card{background:rgba(5,5,5,.9);border:1px solid var(--border2);border-radius:var(--r4);padding:40px 30px;width:100%;max-width:380px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);animation:card-up .5s cubic-bezier(.16,1,.3,1)}
@keyframes card-up{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}
.lk-brand{text-align:center;margin-bottom:28px}
.lk-logo{margin:0 auto 14px;display:block}
.lk-title{font-size:1.7rem;font-weight:900;letter-spacing:3px;color:var(--gold)}
.lk-sub{font-size:.78rem;color:var(--grey);margin-top:5px}
.lk-field{position:relative;margin-bottom:12px}
.lk-field input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px 14px 44px;color:var(--txt);font-size:.95rem;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;direction:ltr;text-align:center;letter-spacing:4px}
.lk-field input:focus{border-color:var(--gold);background:var(--card-h)}
.lk-field input::placeholder{letter-spacing:0;text-align:right;color:var(--dim)}
.lk-field .fi{position:absolute;top:50%;right:14px;transform:translateY(-50%);font-size:.95rem;pointer-events:none;opacity:.4}
.lk-btn{width:100%;background:linear-gradient(135deg,var(--gold-l),var(--gold-d));color:#000;border:none;border-radius:var(--r);padding:14px;font-size:1rem;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px}
.lk-btn:active{transform:scale(.98);opacity:.85}
.lk-btn:disabled{opacity:.5;cursor:wait}
.lk-err{background:var(--red-bg);border:1px solid rgba(229,57,53,.25);border-radius:var(--r);padding:10px 14px;font-size:.8rem;color:#EF9A9A;text-align:center;margin-top:10px;display:none;animation:shake .35s}
.lk-err.on{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.lk-status{font-size:.7rem;color:var(--grey);text-align:center;margin-top:8px;min-height:16px}
.lk-links{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap}
.lk-link{font-size:.72rem;color:var(--grey);cursor:pointer;text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:4px}
.lk-link:hover,.lk-link:active{color:var(--gold)}

/* ═══════════ GUEST WATCH TIMER BANNER ═══════════ */
#guestBanner{display:none;background:linear-gradient(135deg,var(--gold-bg),var(--gold-bg2));border-bottom:1px solid rgba(245,197,24,.15);padding:6px 14px;text-align:center;font-size:.72rem;color:var(--gold-l);flex-shrink:0;cursor:pointer}
#guestBanner.on{display:block}

/* ═══════════ APP SHELL ═══════════ */
#app{display:none;flex-direction:column;height:100vh;height:100svh;position:fixed;inset:0;background:var(--bg);overflow:hidden}
#app.on{display:flex}

/* ═══════════ NAVBAR ═══════════ */
.anav{background:rgba(5,5,5,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:0 14px;padding-top:var(--st);height:calc(var(--nav-h) + var(--st));display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border);z-index:50;position:relative}
.anav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.anav-title{font-size:1.1rem;font-weight:900;letter-spacing:2px;color:var(--gold)}
.anav-sp{flex:1}
.anav-user{font-size:.68rem;color:var(--grey);display:flex;align-items:center;gap:5px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#46d369;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(70,211,105,.4)}50%{opacity:.5;box-shadow:0 0 0 4px rgba(70,211,105,0)}}
.anav-btns{display:flex;align-items:center;gap:6px}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--grey);font-size:.68rem;padding:5px 10px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap}
.nav-btn:active{color:var(--gold);border-color:var(--gold)}

/* ═══════════ TABS ═══════════ */
.tabs{display:flex;background:rgba(5,5,5,.95);flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:72px;background:transparent;border:none;border-bottom:2px solid transparent;padding:0 6px;height:var(--tab-h);color:var(--grey);font-size:.75rem;font-weight:600;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .22s;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-ico{font-size:.9rem}

/* ═══════════ BODY / VIEWS ═══════════ */
.abody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth}
.view{display:none;padding-bottom:calc(var(--sb)+24px)}.view.on{display:block}

/* ═══════════ HERO SLIDER ═══════════ */
.hero{position:relative;width:100%;height:280px;overflow:hidden;background:var(--surface)}
@media(min-width:600px){.hero{height:380px}}
@media(min-width:900px){.hero{height:480px}}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;background-size:cover;background-position:center}
.hero-slide.active{opacity:1}
.hero-grad{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 0%,rgba(5,5,5,.5) 40%,rgba(5,5,5,.15) 70%,rgba(5,5,5,.45) 100%)}
.hero-content{position:absolute;bottom:22px;right:16px;left:16px;z-index:2}
.hero-title{font-size:1.3rem;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.9);line-height:1.25;margin-bottom:6px}
.hero-meta{font-size:.72rem;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-badge{background:var(--gold);color:#000;font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.5px}
.hero-badge.live{background:var(--red)}
.hero-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:3}
.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .4s;cursor:pointer}
.hero-dot.on{background:var(--gold);width:18px;border-radius:3px}

/* ═══════════ SECTIONS ═══════════ */
.section{padding:14px 14px 0}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:6px}
.section-count{font-size:.65rem;color:var(--grey);background:var(--glass);border:1px solid var(--glass-b);border-radius:50px;padding:2px 9px}
.section-search{width:100%;position:relative;margin-bottom:10px}
.section-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px 10px 36px;color:var(--txt);font-size:.82rem;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.section-search input:focus{border-color:rgba(245,197,24,.35)}
.section-search::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.72rem;pointer-events:none}

/* ═══════════ TMDB ROW (HORIZONTAL SCROLL) ═══════════ */
.tmdb-row-wrap{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px 2px}
.tmdb-row-wrap::-webkit-scrollbar{display:none}
.tmdb-row{display:flex;gap:8px;width:max-content}
.tmdb-card{flex-shrink:0;width:110px;cursor:pointer;transition:transform .2s}
.tmdb-card:active{transform:scale(.95)}
.tmdb-img{width:110px;height:165px;border-radius:var(--r);object-fit:cover;background:var(--card);display:block}
.tmdb-name{font-size:.66rem;font-weight:600;margin-top:4px;color:var(--txt2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tmdb-meta{font-size:.58rem;color:var(--grey);margin-top:2px}
@media(min-width:480px){.tmdb-card{width:130px}.tmdb-img{width:130px;height:195px}}

/* ═══════════ CONTINUE WATCHING ROW ═══════════ */
.cw-row-wrap{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px 2px}
.cw-row-wrap::-webkit-scrollbar{display:none}
.cw-row{display:flex;gap:8px;width:max-content}
.cw-card{flex-shrink:0;width:160px;cursor:pointer;transition:transform .22s;position:relative}
.cw-card:active{transform:scale(.95)}
.cw-thumb{width:160px;height:90px;border-radius:var(--r);object-fit:cover;background:var(--card);display:block}
.cw-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15);border-radius:0 0 var(--r) var(--r);overflow:hidden}
.cw-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--gold-d));transition:width .3s}
.cw-name{font-size:.68rem;font-weight:600;margin-top:4px;color:var(--txt2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ═══════════ CATEGORY LIST ═══════════ */
.cat-list{display:flex;flex-direction:column;gap:3px;padding:0 14px}
.cat-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;animation:row-in .3s ease backwards}
@keyframes row-in{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.cat-row:nth-child(1){animation-delay:.02s}.cat-row:nth-child(2){animation-delay:.04s}.cat-row:nth-child(3){animation-delay:.06s}.cat-row:nth-child(n+4){animation-delay:.08s}
.cat-row:active{background:rgba(245,197,24,.05);border-color:rgba(245,197,24,.15);transform:translateX(-2px)}
.cr-ico{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center}
.cr-name{flex:1;font-size:.86rem;font-weight:600;color:var(--txt2)}
.cr-count{font-size:.6rem;color:var(--dim);background:var(--glass);border:1px solid var(--border);border-radius:50px;padding:1px 7px}
.cr-arr{color:var(--dim);font-size:1rem;font-family:monospace;transform:scaleX(-1)}

/* ═══════════ CHANNELS GRID ═══════════ */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;padding:0 14px}
.ch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 6px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:all .22s}
.ch-card:active{transform:scale(.95);border-color:rgba(245,197,24,.25);background:var(--card)}
.ch-logo-wrap{width:50px;height:50px;border-radius:10px;margin:0 auto 7px;background:var(--card);overflow:hidden;display:flex;align-items:center;justify-content:center}
.ch-logo{width:100%;height:100%;object-fit:contain;padding:3px}
.ch-logo-ico{font-size:1.4rem}
.ch-name{font-size:.66rem;font-weight:600;line-height:1.35;color:var(--txt2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.live-tag{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;font-size:.48rem;font-weight:800;padding:2px 5px;border-radius:3px;letter-spacing:.5px;animation:live-blink 2s infinite}
@keyframes live-blink{0%,100%{opacity:1}50%{opacity:.5}}
.sub-tag{position:absolute;top:5px;left:5px;background:linear-gradient(135deg,var(--gold-l),var(--gold-d));color:#000;font-size:.48rem;font-weight:800;padding:2px 5px;border-radius:3px}

/* ═══════════ VOD GRID ═══════════ */
.vod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 14px}
@media(min-width:480px){.vod-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}}
.vod-card{cursor:pointer;transition:transform .22s;position:relative;animation:row-in .3s ease backwards}
.vod-card:active{transform:scale(.95)}
.vod-poster{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--card)}
.vod-score{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.85);border-radius:4px;padding:2px 5px;font-size:.58rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:2px}
.vod-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.12);border-radius:0 0 var(--r) var(--r);overflow:hidden}
.vod-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--gold-d))}
.vod-name{font-size:.67rem;font-weight:600;margin-top:5px;line-height:1.3;color:var(--txt2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lock-ico{position:absolute;top:5px;left:5px;font-size:.85rem;opacity:.9}

/* ═══════════ SPORTS SECTION ═══════════ */
.sports-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sports-tabs::-webkit-scrollbar{display:none}
.sport-tab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:.72rem;font-weight:600;color:var(--grey);cursor:pointer;transition:all .22s;white-space:nowrap;font-family:'Cairo',sans-serif}
.sport-tab.on{background:var(--gold-bg2);border-color:rgba(245,197,24,.35);color:var(--gold)}

/* ═══════════ BACK BUTTON ═══════════ */
.back-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:7px 13px;color:var(--grey);font-size:.78rem;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;margin:12px 14px 4px}
.back-btn:active{color:var(--gold);border-color:var(--gold)}

/* ═══════════ LOADING ═══════════ */
.ldr{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px}
.ldr-ring{width:36px;height:36px;border:3px solid var(--gold-bg);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldr-txt{font-size:.78rem;color:var(--grey)}

/* ═══════════ EMPTY ═══════════ */
.mpty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 20px;text-align:center}
.mpty-ico{font-size:2.6rem;opacity:.4}
.mpty-txt{font-size:.8rem;color:var(--grey);line-height:1.8;white-space:pre-line;max-width:260px}

'use strict';
/* ═══════════════════════════════════════════════════════════
   TOTV+ WEB v3.0 — Fully Synchronized with Flutter App
   ✅ ServerRegistry + Failover (12 servers + hardcoded fallback)
   ✅ iOS Mixed-Content Fix (dynamic HTTP/HTTPS detection)
   ✅ PWA (Add to Home Screen)

   ✅ Continue Watching (localStorage)

   ✅ 24h cache (shared_preferences_web via localStorage)
   ✅ Telegram support bot link
═══════════════════════════════════════════════════════════ */

/* ─── CONFIG — matches constants.dart exactly ─── */
const CFG = {
  PIN:         '1212',
  TG_CHANNEL:  'https://t.me/O_2828',
  PAY_BOT:     'https://t.me/PaymentTOTVBOT',
  CMS_BASE:    'https://bitter-frog-2c67.haedirasso.workers.dev',
  GITHUB_CDN:  'https://hamza123123123.github.io/totv',
  TMDB_KEY:    '5b166a24c91f59178e8ce30f1f3735c0',
  TMDB_IMG:    'https://image.tmdb.org/t/p/',
  TIMEOUT:     14000,
  // CORS Proxies (ordered by reliability)
  PROXIES: [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest=',
  ],
  // Hardcoded fallback server — matches ServerRegistry._kFallbackHost
  FALLBACK: {
    host:     'http://silka.m3um9xplus.org:2052',
    username: 'totv5201093051',
    password: '17348547711072',
  },
  // Primary server (RC defaults)
  PRIMARY: {
    host:     'http://usmmax.org:2052',
    username: '28701367011637',
    password: '26997520760476',
  },
  // Cache TTLs (ms) — matches app_state.dart
  CACHE_TTL:  24 * 3600 * 1000,  // 24h for content
  GUEST_MAX_MS: 3600 * 1000,     // 1 hour guest
};

/* ─── DEVICE DETECTION ─── */
const Device = {
  isIOS:    /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream,
  isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent),
  isAndroid:/Android/.test(navigator.userAgent),
  isMobile: /Mobi|Android/i.test(navigator.userAgent),
  isSecure: location.protocol === 'https:',
  // iOS Safari cannot play HTTP streams on HTTPS pages even with proxy
  // We detect and handle this specifically
  get needsProxy() { return this.isSecure; },
  get canHLS() {
    // iOS Safari supports HLS natively
    if (this.isIOS || this.isSafari) return 'native';
    if (typeof Hls !== 'undefined' && Hls.isSupported()) return 'hlsjs';
    return 'native';
  },
};

/* ─── SERVER REGISTRY — mirrors ServerRegistry in constants.dart ─── */
const SrvReg = {
  _servers: [],
  _failed:  new Set(),
  _proxyIdx: 0,
  _workingProxy: null,
  _fallback: CFG.FALLBACK,

  init() {
    // Start with primary + fallback, Firestore servers added later
    this._servers = [
      { ...CFG.PRIMARY,  name: 'Primary',  priority: 1, alive: true },
      { ...CFG.FALLBACK, name: 'Fallback', priority: 99, alive: true },
    ];
  },

  applyServers(list) {
    if (!list || !list.length) return;
    this._servers = list.map(s => ({ ...s, alive: !this._failed.has(s.host) }));
    // Always keep hardcoded fallback at end
    const hasFallback = this._servers.some(s => s.host === CFG.FALLBACK.host);
    if (!hasFallback) this._servers.push({ ...CFG.FALLBACK, name: 'Fallback', priority: 99, alive: true });
  },

  get current() {
    const alive = this._servers.filter(s => s.alive);
    return alive.length ? alive[0] : this._fallback;
  },

  failover(host) {
    this._failed.add(host);
    this._servers.forEach(s => { if (s.host === host) s.alive = false; });
    const alive = this._servers.filter(s => s.alive);
    if (!alive.length) {
      console.warn('[SrvReg] All dead → using hardcoded fallback');
      return this._fallback;
    }
    return alive[0];
  },

  get host()     { return this.current.host.replace(/\/$/, ''); },
  get username() { return this.current.username; },
  get password() { return this.current.password; },

  /* Build API URL */
  apiUrl(action, extra = '') {
    return `${this.host}/player_api.php?username=${this.username}&password=${this.password}&action=${action}${extra}`;
  },

  /* Build stream URLs (load-balanced) */
  liveUrl(id)       { return `${this.host}/live/${this.username}/${this.password}/${id}`; },
  vodUrl(id)        { return `${this.host}/movie/${this.username}/${this.password}/${id}.mp4`; },
  epUrl(id, ext)    { return `${this.host}/series/${this.username}/${this.password}/${id}.${ext || 'mp4'}`; },

  /* All live URLs for failover (like ServerRegistry.streamUrls) */
  allLiveUrls(id) {
    return this._servers
      .filter(s => s.alive)
      .map(s => `${s.host.replace(/\/$/, '')}/live/${s.username}/${s.password}/${id}`)
      .concat([`${CFG.FALLBACK.host}/live/${CFG.FALLBACK.username}/${CFG.FALLBACK.password}/${id}`]);
  },
};

/* ─── PROTOCOL BRIDGE — iOS Mixed-Content Fix ─── */
/*
  iOS Safari on HTTPS blocks HTTP requests (mixed content).
  Solution: Route all HTTP API calls and image URLs through CORS proxy.
  For video: iOS native player handles HLS even on HTTP if we use blob or proxy.
  Dynamic detection avoids breaking HTTP-served pages.
*/
const Bridge = {
  _proxyIdx: 0,
  _workingProxy: null,

  /* Wrap an HTTP url through CORS proxy when on HTTPS */
  proxyWrap(url) {
    if (!Device.needsProxy) return url;
    if (url.startsWith('https://')) return url;
    const proxy = this._workingProxy || CFG.PROXIES[this._proxyIdx % CFG.PROXIES.length];
    return proxy + encodeURIComponent(url);
  },

  /* Fetch JSON — handles HTTP→HTTPS via proxy rotation */
  async fetchJSON(url, retries = 3) {
    if (!Device.needsProxy) {
      return this._direct(url, retries);
    }
    // On HTTPS: rotate through proxies
    for (let p = 0; p < CFG.PROXIES.length; p++) {
      const proxy = CFG.PROXIES[(this._proxyIdx + p) % CFG.PROXIES.length];
      const proxied = url.startsWith('https://') ? url : proxy + encodeURIComponent(url);
      try {
        const result = await this._direct(proxied, 2);
        this._workingProxy = proxy;
        this._proxyIdx = (this._proxyIdx + p) % CFG.PROXIES.length;
        return result;
      } catch(e) {
        console.warn(`[Bridge] Proxy ${p+1} failed:`, e.message);
      }
    }
    // Try CMS Worker as last resort
    try {
      const workerUrl = `${CFG.CMS_BASE}/api?url=${encodeURIComponent(url)}`;
      return await this._direct(workerUrl, 1);
    } catch(_) {}
    throw new Error('All proxies exhausted');
  },

  async _direct(url, retries = 2) {
    let last;
    for (let i = 0; i < retries; i++) {
      try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), CFG.TIMEOUT);
        const res  = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
        clearTimeout(tid);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const txt = await res.text();
        try { return JSON.parse(txt); } catch(_) { return txt; }
      } catch(e) {
        last = e;
        if (i < retries - 1) await sleep(1200 * (i + 1));
      }
    }
    throw last;
  },

  /* Fix image URL for HTTPS pages (HTTP images break on iOS Safari) */
  fixImgUrl(url) {
    if (!url || !Device.needsProxy) return url;
    if (url.startsWith('https://') || url.startsWith('data:')) return url;
    // Route HTTP images through CMS img proxy
    return `${CFG.CMS_BASE}/img?url=${encodeURIComponent(url)}`;
  },

  /* Get playable video URL — the key iOS fix */
  getVideoUrl(url) {
    if (!url) return url;
    if (!Device.needsProxy) return url;
    if (url.startsWith('https://')) return url;
    // For HTTPS pages: proxy HTTP stream through CMS Worker
    return `${CFG.CMS_BASE}/vip-stream?url=${encodeURIComponent(url)}`;
  },

  /* HLS.js config for HTTPS — proxy all segment requests */
  getHLSConfig() {
    if (!Device.needsProxy) return {};
    const self = this;
    return {
      xhrSetup(xhr, url) {
        if (!url.startsWith('http://')) return;
        const proxy = self._workingProxy || CFG.PROXIES[0];
        xhr.open('GET', proxy + encodeURIComponent(url), true);
      },
    };
  },
};

/* ─── LOCAL CACHE — mirrors app_state.dart cache logic ─── */
const Cache = {
  _K: {
    live: 'totv_cache_live_v5', liveCats: 'totv_cache_lcats_v5',
    movies: 'totv_cache_movies_v5', movieCats: 'totv_cache_mcats_v5',
    series: 'totv_cache_series_v5', seriesCats: 'totv_cache_scats_v5',
    ts: 'totv_cache_time_v5',
    hero: 'totv_cache_hero_v5',
  },
  _K_SESS:  '_tv6',
  _K_GUEST: 'wt_used_ms_web',
  _K_GDATE: 'wt_date_web',
  _K_CW:    'totv_watch_progress_v1',

  save(key, data) {
    try { localStorage.setItem(this._K[key] || key, JSON.stringify(data)); } catch(_) {}
  },
  load(key) {
    try { const r = localStorage.getItem(this._K[key] || key); return r ? JSON.parse(r) : null; } catch(_) { return null; }
  },
  saveTs() {
    try { localStorage.setItem(this._K.ts, Date.now().toString()); } catch(_) {}
  },
  isExpired() {
    try {
      const ts = parseInt(localStorage.getItem(this._K.ts) || '0');
      return Date.now() - ts > CFG.CACHE_TTL;
    } catch(_) { return true; }
  },
  saveSession()  { try { localStorage.setItem(this._K_SESS, '1'); } catch(_) {} },
  loadSession()  { try { return localStorage.getItem(this._K_SESS) === '1'; } catch(_) { return false; } },
  clearSession() { try { localStorage.removeItem(this._K_SESS); } catch(_) {} },

  // Continue Watching (WatchHistory in app)
  getCW(id) {
    try { const d = JSON.parse(localStorage.getItem(this._K_CW) || '{}'); return d[id] || 0; } catch(_) { return 0; }
  },
  setCW(id, secs) {
    try {
      const d = JSON.parse(localStorage.getItem(this._K_CW) || '{}');
      d[id] = secs;
      localStorage.setItem(this._K_CW, JSON.stringify(d));
    } catch(_) {}
  },
  getAllCW() {
    try { return JSON.parse(localStorage.getItem(this._K_CW) || '{}'); } catch(_) { return {}; }
  },

  // Guest timer
  getGuestMs() {
    try {
      const today = _today();
      const d = localStorage.getItem(this._K_GDATE);
      if (d !== today) { this.resetGuest(); return 0; }
      return parseInt(localStorage.getItem(this._K_GUEST) || '0');
    } catch(_) { return 0; }
  },
  addGuestMs(ms) {
    try {
      const total = this.getGuestMs() + ms;
      localStorage.setItem(this._K_GUEST, total.toString());
      localStorage.setItem(this._K_GDATE, _today());
      return total;
    } catch(_) { return 0; }
  },
  resetGuest() {
    try {
      localStorage.setItem(this._K_GUEST, '0');
      localStorage.setItem(this._K_GDATE, _today());
    } catch(_) {}
  },
};

/* ─── GUEST TIMER — WatchTimer mirror ─── */
const GuestTimer = {
  _startMs: null,
  _savedMs: 0,
  _timer: null,
  _interval: null,
  isGuest: true, // set false when subscribed

  load() {
    this._savedMs = Cache.getGuestMs();
  },

  get totalMs() {
    if (!this._startMs) return this._savedMs;
    return this._savedMs + (Date.now() - this._startMs);
  },

  get remainMs() { return Math.max(0, CFG.GUEST_MAX_MS - this.totalMs); },
  get isExpired() { return this.totalMs >= CFG.GUEST_MAX_MS; },
  get remainStr() {
    const s = Math.ceil(this.remainMs / 1000);
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
  },

  startPlayback() {
    if (!this.isGuest || this._startMs) return;
    this._startMs = Date.now();
    this._interval = setInterval(() => {
      if (this.isExpired) {
        this.stopPlayback();
        Player.close();
        showSubSheet('انتهى وقتك المجاني اليومي');
      }
      U.updateGuestBanner();
    }, 3000);
  },

  stopPlayback() {
    if (!this._startMs) return;
    const elapsed = Date.now() - this._startMs;
    this._savedMs = Cache.addGuestMs(elapsed);
    this._startMs = null;
    clearInterval(this._interval);
    this._interval = null;
  },

  checkCanPlay() {
    if (!this.isGuest) return true;
    if (this.isExpired) { showSubSheet(); return false; }
    return true;
  },
};

/* ─── HERO SLIDER ─── */
const Hero = {
  _i: 0, _t: null,
  async render() {
    const items = await TMDB.trending();
    if (!items.length) return '';
    let slides = '', dots = '';
    items.slice(0, 8).forEach((m, i) => {
      const bd = TMDB.bd(m.backdrop_path);
      const active = i === 0 ? ' active' : '';
      slides += `<div class="hero-slide${active}" style="background-image:url('${bd}')">
        <div class="hero-grad"></div>
        <div class="hero-content">
          <div class="hero-title">${esc(m.title || m.name)}</div>
          <div class="hero-meta">
            <span class="hero-badge">TMDB</span>
            <span>⭐ ${(m.vote_average||0).toFixed(1)}</span>
            <span>${(m.release_date||'').slice(0,4)}</span>
          </div>
        </div>
      </div>`;
      dots += `<div class="hero-dot${active}" data-i="${i}"></div>`;
    });
    return `<div class="hero" id="heroSlider">${slides}<div class="hero-dots">${dots}</div></div>`;
  },
  start() {
    this.stop();
    this._t = setInterval(() => this.next(), 5000);
    // tap dots
    setTimeout(() => {
      document.querySelectorAll('.hero-dot').forEach(d => {
        d.onclick = () => this.goTo(parseInt(d.dataset.i));
      });
    }, 100);
  },
  stop() { if (this._t) { clearInterval(this._t); this._t = null; } },
  next() {
    const slides = document.querySelectorAll('#heroSlider .hero-slide');
    const dots   = document.querySelectorAll('#heroSlider .hero-dot');
    if (!slides.length) return;
    slides[this._i]?.classList.remove('active');
    dots[this._i]?.classList.remove('on');
    this._i = (this._i + 1) % slides.length;
    slides[this._i]?.classList.add('active');
    dots[this._i]?.classList.add('on');
  },
  goTo(i) {
    const slides = document.querySelectorAll('#heroSlider .hero-slide');
    const dots   = document.querySelectorAll('#heroSlider .hero-dot');
    slides[this._i]?.classList.remove('active');
    dots[this._i]?.classList.remove('on');
    this._i = i;
    slides[this._i]?.classList.add('active');
    dots[this._i]?.classList.add('on');
  },
};

/* ─── CONTINUE WATCHING ROW ─── */
function cwRow(items) {
  const cw = Cache.getAllCW();
  const inProgress = items.filter(it => {
    const id = it.stream_id || it.series_id;
    return id && cw[id] && cw[id] > 10;
  }).slice(0, 10);
  if (!inProgress.length) return '';
  let cards = '';
  inProgress.forEach(it => {
    const id  = it.stream_id || it.series_id;
    const img = U.fixImg(it.stream_icon || it.cover || '');
    const pct = Math.min(1, (cw[id] || 0) / 3600) * 100;
    const name = esc(it.name);
    cards += `<div class="cw-card" data-id="${id}">
      <img src="${img}" class="cw-thumb" alt="${name}" loading="lazy" onerror="this.style.opacity='.3'">
      <div class="cw-bar"><div class="cw-bar-fill" style="width:${pct}%"></div></div>
      <div class="cw-name">${name}</div>
    </div>`;
  });
  return `<div class="section">
    <div class="section-hd"><div class="section-title">▶ متابعة المشاهدة</div></div>
  </div>
  <div class="cw-row-wrap"><div class="cw-row">${cards}</div></div>`;
}

/* ─── APP STATE LOADER — mirrors AppState.loadAll ─── */
const Loader = {
  _loading: false,

  async loadAll(force = false) {
    if (this._loading) return;
    this._loading = true;
    // Layer 1: disk cache (instant)
    if (!force && !S.loaded) {
      this._loadFromDisk();
      if (S.live.length || S.movies.length) {
        S.loaded = true;
        Content.renderCurrentTab();
        if (!Cache.isExpired()) { this._loading = false; return; }
      }
    }
    // Layer 2: network
    await this._fetchNetwork(force);
    this._loading = false;
  },

  _loadFromDisk() {
    S.liveCats   = Cache.load('liveCats')   || [];
    S.live       = Cache.load('live')       || [];
    S.movieCats  = Cache.load('movieCats')  || [];
    S.movies     = Cache.load('movies')     || [];
    S.seriesCats = Cache.load('seriesCats') || [];
    S.series     = Cache.load('series')     || [];
    if (S.live.length || S.movies.length) S.loaded = true;
  },

  async _fetchNetwork(force) {
    // Try 1: CMS Worker batch endpoint
    try {
      const r = await fetch(`${CFG.CMS_BASE}/content?type=all`, { cache: 'no-store' });
      if (r.ok) {
        const d = await r.json();
        if ((d.live || []).length || (d.movies || []).length) {
          this._apply(d);
          return;
        }
      }
    } catch(_) {}

    // Try 2: Direct Xtream server (via proxy on HTTPS)
    try {
      const [lc, mc, sc] = await Promise.allSettled([
        Bridge.fetchJSON(SrvReg.apiUrl('get_live_categories')),
        Bridge.fetchJSON(SrvReg.apiUrl('get_vod_categories')),
        Bridge.fetchJSON(SrvReg.apiUrl('get_series_categories')),
      ]);
      if (lc.status === 'fulfilled' && Array.isArray(lc.value)) {
        S.liveCats   = lc.value;
        S.movieCats  = mc.status === 'fulfilled' ? mc.value || [] : [];
        S.seriesCats = sc.status === 'fulfilled' ? sc.value || [] : [];
        // Fetch streams in background
        this._fetchStreams();
        this._saveToDisk();
        S.loaded = true;
        Content.renderCurrentTab();
      }
    } catch(e) {
      console.warn('[Loader] Direct fetch failed:', e.message);
    }

    // Try 3: GitHub CDN
    try { await this._fetchGithub(); } catch(_) {}
  },

  async _fetchStreams() {
    // background: fetch all live/movie/series streams for search & CW
    try {
      const [live, movies, series] = await Promise.allSettled([
        Bridge.fetchJSON(SrvReg.apiUrl('get_live_streams')),
        Bridge.fetchJSON(SrvReg.apiUrl('get_vod_streams')),
        Bridge.fetchJSON(SrvReg.apiUrl('get_series')),
      ]);
      if (live.status === 'fulfilled' && Array.isArray(live.value)) S.live = live.value;
      if (movies.status === 'fulfilled' && Array.isArray(movies.value)) S.movies = movies.value;
      if (series.status === 'fulfilled' && Array.isArray(series.value)) S.series = series.value;
      this._saveToDisk();
    } catch(_) {}
  },

  async _fetchGithub() {
    const urls = {
      movies: `${CFG.GITHUB_CDN}/movies.json`,
      series: `${CFG.GITHUB_CDN}/series.json`,
      live:   `${CFG.GITHUB_CDN}/live.json`,
      movie_cats:  `${CFG.GITHUB_CDN}/movie_cats.json`,
      series_cats: `${CFG.GITHUB_CDN}/series_cats.json`,
      live_cats:   `${CFG.GITHUB_CDN}/live_cats.json`,
    };
    const results = await Promise.allSettled(
      Object.entries(urls).map(([k, u]) =>
        fetch(u, { cache: 'no-store' }).then(r => r.json()).then(v => [k, v]).catch(() => [k, []])
      )
    );
    const data = {};
    results.forEach(r => { if (r.status === 'fulfilled') { const [k,v] = r.value; data[k] = v; } });
    if ((data.live || []).length || (data.movies || []).length) this._apply(data);
  },

  _apply(d) {
    if ((d.live   || []).length) S.live       = d.live;
    if ((d.movies || []).length) S.movies     = d.movies;
    if ((d.series || []).length) S.series     = d.series;
    if ((d.live_cats   || []).length) S.liveCats   = d.live_cats;
    if ((d.movie_cats  || []).length) S.movieCats  = d.movie_cats;
    if ((d.series_cats || []).length) S.seriesCats = d.series_cats;
    S.loaded = true;
    this._saveToDisk();
    Content.renderCurrentTab();
  },

  _saveToDisk() {
    Cache.save('live',       S.live.slice(0, 2000));
    Cache.save('movies',     S.movies.slice(0, 3000));
    Cache.save('series',     S.series.slice(0, 3000));
    Cache.save('liveCats',   S.liveCats);
    Cache.save('movieCats',  S.movieCats);
    Cache.save('seriesCats', S.seriesCats);
    Cache.saveTs();
  },
};

  /* ── SPORTS — matches series_sports.dart sports logic ── */
  async renderSports() {
    const el = $('c-sports');
    // Filter live streams with sport keywords
    let allSports = S.live.filter(ch => {
      const n = (ch.name || '').toLowerCase();
      const c = (ch.category_name || '').toLowerCase();
      return SPORTS_CATS.some(cat =>
        cat.keywords.some(kw => n.includes(kw) || c.includes(kw))
      ) || n.includes('sport') || n.includes('رياض') || c.includes('sport') || c.includes('رياض');
    });

    // If no cached data, try loading from server
    if (!allSports.length && S.live.length === 0) {
      el.innerHTML = U.ldr('جاري جلب القنوات الرياضية...');
      await Loader.loadAll();
      allSports = S.live.filter(ch => {
        const n = (ch.name || '').toLowerCase();
        return SPORTS_CATS.some(cat => cat.keywords.some(kw => n.includes(kw)))
          || n.includes('sport') || n.includes('رياض');
      });
    }

    if (!allSports.length) {
      // Show sport categories from live cats
      const sportCats = S.liveCats.filter(c => {
        const n = (c.category_name || '').toLowerCase();
        return n.includes('sport') || n.includes('رياض') || n.includes('bein') || n.includes('كرة');
      });
      if (sportCats.length) {
        let h = `<div class="section">
          <div class="section-hd"><div class="section-title">⚽ القنوات الرياضية</div></div>
        </div>
        <div class="cat-list">`;
        sportCats.forEach((v, i) => { h += catRow(v.category_id, ICO.sports[i % ICO.sports.length], v.category_name); });
        h += '</div>';
        el.innerHTML = h;
        el.querySelectorAll('.cat-row').forEach(r => {
          r.onclick = () => {
            this._curTab = 'live';
            document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === 'live'));
            document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === 'v-live'));
            this.openLiveCat(r.dataset.id, r.querySelector('.cr-name').textContent.trim());
          };
        });
        return;
      }
      el.innerHTML = U.mpty('⚽', 'لا توجد قنوات رياضية\nتحقق من الاتصال', 'تحديث', 'Loader.loadAll(true)');
      return;
    }

    // Group by sport category
    const groups = {};
    SPORTS_CATS.forEach(cat => {
      const chs = cat.keywords.length
        ? allSports.filter(ch => {
            const n = (ch.name || '').toLowerCase();
            return cat.keywords.some(kw => n.includes(kw));
          })
        : allSports.filter(ch => {
            const n = (ch.name || '').toLowerCase();
            return !SPORTS_CATS.slice(0,-1).some(c => c.keywords.some(kw => n.includes(kw)));
          });
      if (chs.length) groups[cat.key] = { ...cat, channels: chs };
    });

    const firstKey = Object.keys(groups)[0] || '';
    this._sportsState = firstKey;

    // Build tabs
    let tabsHtml = '<div class="section" style="padding-top:10px"><div class="sports-tabs">';
    Object.values(groups).forEach(g => {
      tabsHtml += `<button class="sport-tab${g.key === firstKey ? ' on' : ''}" data-key="${g.key}">${g.ico} ${esc(g.name)} (${g.channels.length})</button>`;
    });
    tabsHtml += '</div></div>';

    el.innerHTML = tabsHtml + `<div id="sport-grid"></div>`;

    const renderSportGrid = (key) => {
      const g = groups[key];
      if (!g) return;
      const gid = 'sg' + key;
      let h = `<div class="section">
        <div class="section-search"><input type="text" placeholder="بحث..." data-grid="${gid}"></div>
      </div>
      <div class="ch-grid" id="${gid}">`;
      g.channels.forEach(s => {
        const img = U.fixImg(s.stream_icon || '');
        h += `<div class="ch-card" data-sid="${s.stream_id}" data-name="${esc(s.name||'').toLowerCase()}">
          <div class="live-tag">LIVE</div>
          <div class="ch-logo-wrap">
            ${img ? `<img src="${img}" class="ch-logo" loading="lazy" onerror="this.style.opacity='.2'">` : `<div class="ch-logo-ico">⚽</div>`}
          </div>
          <div class="ch-name">${esc(s.name)}</div>
        </div>`;
      });
      h += '</div>';
      $('sport-grid').innerHTML = h;
      el.querySelector(`[data-grid="${gid}"]`).oninput = e => filterGrid(e.target.value, gid);
      $('sport-grid').querySelectorAll('.ch-card').forEach(c => {
        c.onclick = () => Player.playLive(c.dataset.sid, c.querySelector('.ch-name').textContent.trim());
      });
    };

    renderSportGrid(firstKey);

    el.querySelectorAll('.sport-tab').forEach(t => {
      t.onclick = () => {
        el.querySelectorAll('.sport-tab').forEach(x => x.classList.remove('on'));
        t.classList.add('on');
        renderSportGrid(t.dataset.key);
      };
    });

  /* ── VOD GRID (shared for movies + series) ── */
  renderVodGrid(streams, name, el, type, cid) {
    if (!streams.length) { el.innerHTML = U.mpty('🎬', 'لا توجد محتويات'); return; }
    const bkId = 'bk-' + type + cid;
    const gid  = 'vg' + cid;
    let h = `<button class="back-btn" id="${bkId}">‹ رجوع</button>
      <div class="section">
        <div class="section-hd">
          <div class="section-title">${esc(name)}</div>
          <div class="section-count">${streams.length}</div>
        </div>
        <div class="section-search"><input type="text" placeholder="بحث..." data-grid="${gid}"></div>
      </div>
      <div class="vod-grid" id="${gid}">`;
    streams.forEach((s, i) => {
      const img  = U.fixImg(s.stream_icon || s.cover || s.movie_image || '');
      const sc   = s.rating ? parseFloat(s.rating).toFixed(1) : '';
      const sid  = s.stream_id || s.series_id;
      const prog = Cache.getCW(String(sid));
      const progPct = prog > 10 ? Math.min(100, (prog / 3600) * 100) : 0;
      h += `<div class="vod-card" data-sid="${sid}" data-type="${type}" data-name="${esc(s.name||'').toLowerCase()}" style="animation-delay:${Math.min(i,.15)*0.04}s">
        ${sc ? `<div class="vod-score">⭐${sc}</div>` : ''}
        <img src="${img}" class="vod-poster" loading="lazy" onerror="this.style.opacity='.25'">
        ${progPct > 0 ? `<div class="vod-progress"><div class="vod-progress-fill" style="width:${progPct}%"></div></div>` : ''}
        <div class="vod-name">${esc(s.name)}</div>
      </div>`;
    });
    h += '</div>';
    el.innerHTML = h;
    $(bkId).onclick = () => {
      if (type === 'movie') { this._movieState = null; this.renderMovies(); }
      else { this._seriesState = null; this.renderSeries(); }
    };
    el.querySelector(`[data-grid="${gid}"]`).oninput = e => filterGrid(e.target.value, gid);
    el.querySelectorAll('.vod-card').forEach(c => {
      c.onclick = () => {
        const n = c.querySelector('.vod-name').textContent.trim();
        if (c.dataset.type === 'movie') Player.playVod(c.dataset.sid, n);
        else this.openSeriesInfo(c.dataset.sid, n, el);
      };
    });
  },
};

/* ─── PLAYER — Full iOS + HTTPS support ─── */
const Player = {
  _hls: null,
  _startedAt: null,
  _curId: null,
  _curType: null,

  playLive(id, name) {
    if (!GuestTimer.checkCanPlay()) return;
    U.vibe(12);
    const url = SrvReg.liveUrl(id) + '.m3u8';
    this.open(url, name, '📡 بث مباشر', 'live', id);
  },

  playVod(id, name) {
    if (!GuestTimer.checkCanPlay()) return;
    U.vibe(12);
    const url = SrvReg.vodUrl(id);
    this.open(url, name, '🎬 فيلم', 'vod', id);
  },

  playEp(id, name, ext) {
    if (!GuestTimer.checkCanPlay()) return;
    U.vibe(12);
    const url = SrvReg.epUrl(id, ext);
    this.open(url, name, '📺 مسلسل', 'ep', id);
  },

  open(url, title, sub, type, id) {
    S.curUrl = url; S.curTitle = title;
    this._curId   = String(id);
    this._curType = type;
    $('ptitle').textContent = title;
    $('psub').textContent   = sub;
    $('pm').classList.add('on');
    document.body.style.overflow = 'hidden';
    history.pushState({ player: true }, '');
    this._build(url, type, id);
    GuestTimer.startPlayback();
    this._startedAt = Date.now();
  },

  _build(url, type, id) {
    this._destroy();
    const wrap = $('pwrap');
    const vid  = document.createElement('video');
    vid.id = 'vplayer';
    vid.setAttribute('playsinline', '');
    vid.setAttribute('webkit-playsinline', '');
    vid.setAttribute('x-webkit-airplay', 'allow');
    vid.controls = true; vid.preload = 'auto'; vid.autoplay = true;
    vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;background:#000;object-fit:contain';
    const buf = this._mkBuf();
    const err = this._mkErr(url, type, id);
    wrap.appendChild(vid);
    wrap.appendChild(buf);
    wrap.appendChild(err);
    this._showBuf(true);

    const isLive = type === 'live' || /\.m3u8/i.test(url);

    if (isLive) {
      this._playHLS(vid, url, id);
    } else {
      // VOD — proxy on HTTPS
      const playUrl = Bridge.getVideoUrl(url);
      this._playNative(vid, playUrl, url, type, id);
    }
  },

  _playHLS(vid, rawUrl, id) {
    // iOS Safari: native HLS
    if (Device.isIOS || Device.isSafari) {
      // iOS: try proxied URL (HTTPS → proxy → HTTP stream)
      const playUrl = Bridge.getVideoUrl(rawUrl);
      this._playNative(vid, playUrl, rawUrl, 'live', id);
      return;
    }
    // HLS.js for Chrome/Firefox on HTTPS
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      const manifestUrl = Bridge.getVideoUrl(rawUrl);
      const hlsCfg = {
        enableWorker: true, lowLatencyMode: true,
        backBufferLength: 30, maxBufferLength: 60,
        fragLoadingTimeOut: 20000, manifestLoadingTimeOut: 15000,
        ...Bridge.getHLSConfig(),
      };
      this._hls = new Hls(hlsCfg);
      this._hls.loadSource(manifestUrl);
      this._hls.attachMedia(vid);
      this._hls.on(Hls.Events.MANIFEST_PARSED, () => {
        this._showBuf(false);
        vid.play().catch(() => {});
      });
      this._hls.on(Hls.Events.ERROR, (_, d) => {
        if (!d.fatal) return;
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR && id) {
          // Failover: try next server
          const next = SrvReg.failover(SrvReg.host);
          if (next) {
            const fallUrl = Bridge.getVideoUrl(`${next.host.replace(/\/$/,'')}/live/${next.username}/${next.password}/${id}.m3u8`);
            this._hls.destroy(); this._hls = null;
            vid.src = fallUrl; vid.load(); vid.play().catch(() => {});
            U.toast('تم التبديل لسيرفر آخر');
          }
        } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
          this._hls.recoverMediaError();
        } else {
          this._showBuf(false);
          this._showErr(true, 'تعذّر تشغيل البث');
        }
      });
      vid.addEventListener('waiting',    () => this._showBuf(true));
      vid.addEventListener('playing',    () => this._showBuf(false));
      vid.addEventListener('canplay',    () => this._showBuf(false));
      vid.addEventListener('loadeddata', () => this._showBuf(false));
    } else {
      // Fallback: native player
      const playUrl = Bridge.getVideoUrl(rawUrl);
      this._playNative(vid, playUrl, rawUrl, 'live', id);
    }
  },

  _playNative(vid, url, origUrl, type, id) {
    vid.addEventListener('waiting',    () => this._showBuf(true));
    vid.addEventListener('playing',    () => this._showBuf(false));
    vid.addEventListener('canplay',    () => this._showBuf(false));
    vid.addEventListener('loadeddata', () => this._showBuf(false));
    vid.addEventListener('timeupdate', () => {
      if (vid.currentTime > 10 && this._curId) {
        Cache.setCW(this._curId, Math.floor(vid.currentTime));
      }
    });
    vid.addEventListener('error', () => {
      // Try .ts fallback for live
      if (type === 'live' && id && !vid._triedTs) {
        vid._triedTs = true;
        const tsUrl = Bridge.getVideoUrl(SrvReg.liveUrl(id) + '.ts');
        vid.src = tsUrl; vid.load(); vid.play().catch(() => {});
        return;
      }
      // Failover to next server
      if (type === 'live' && id && !vid._triedFallback) {
        vid._triedFallback = true;
        const next = SrvReg.failover(SrvReg.host);
        if (next) {
          const fb = Bridge.getVideoUrl(`${next.host.replace(/\/$/,'')}/live/${next.username}/${next.password}/${id}.m3u8`);
          vid.src = fb; vid.load(); vid.play().catch(() => {});
          U.toast('تم التبديل لسيرفر آخر');
          return;
        }
      }
      this._showBuf(false);
      this._showErr(true, 'تعذّر تشغيل المحتوى.\nتأكد من الاتصال أو جرّب سيرفراً آخر');
    });
    vid.src = url; vid.load();
    vid.play().catch(() => { this._showBuf(false); });
  },

  _mkBuf() {
    const d = document.createElement('div');
    d.className = 'bufov on'; d.id = 'bufov';
    d.innerHTML = '<div class="buf-ring"></div><div class="buf-txt">جاري التحميل...</div>';
    return d;
  },

  _mkErr(url, type, id) {
    const d = document.createElement('div');
    d.className = 'errov'; d.id = 'errov';
    d.innerHTML = `<div class="err-ico">⚠️</div>
      <div class="err-msg" id="ermsg">تعذّر التشغيل</div>
      <button class="retry-btn" id="retryBtn">إعادة المحاولة</button>
      <div class="server-btns" id="srvBtns"></div>`;
    setTimeout(() => {
      $('retryBtn')?.addEventListener('click', () => {
        U.vibe(10); this._build(url, type, id);
      });
      // Server switcher buttons
      const btns = $('srvBtns');
      if (btns && type === 'live') {
        SrvReg._servers.slice(0, 4).forEach((s, i) => {
          const b = document.createElement('button');
          b.className = 'server-btn';
          b.textContent = s.name || `سيرفر ${i+1}`;
          b.onclick = () => {
            document.querySelectorAll('.server-btn').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            const newUrl = Bridge.getVideoUrl(`${s.host.replace(/\/$/,'')}/live/${s.username}/${s.password}/${id}.m3u8`);
            this._build(newUrl, type, id);
          };
          btns.appendChild(b);
        });
      }
    }, 100);
    return d;
  },

  _showBuf(s) { $('bufov')?.classList.toggle('on', s); },
  _showErr(s, m) {
    $('errov')?.classList.toggle('on', s);
    if (s && m) { const x = $('ermsg'); if (x) x.textContent = m; }
  },

  _destroy() {
    if (this._hls) { try { this._hls.destroy(); } catch(_) {} this._hls = null; }
    const w = $('pwrap');
    while (w.firstChild) w.removeChild(w.firstChild);
  },

  close() {
    U.vibe(8);
    // Save CW progress
    const vid = document.getElementById('vplayer');
    if (vid && vid.currentTime > 10 && this._curId) {
      Cache.setCW(this._curId, Math.floor(vid.currentTime));
    }
    GuestTimer.stopPlayback();
    this._destroy();
    $('pm').classList.remove('on');
    document.body.style.overflow = '';
    if (this._curType === 'vod') {
      // Re-render to update progress bar
      Content.renderCurrentTab();
    }
  },
};

/* ─── AUTH ─── */
const Auth = {
  async checkPin() {
    const val = $('pinIn').value.trim();
    if (val !== CFG.PIN) {
      U.vibe([10,50,10,50]);
      showErr('pinErr', 'رمز الدخول غير صحيح');
      $('pinIn').value = '';
      $('pinIn').focus();
      return;
    }
    U.vibe(15);
    const btn = $('pinBtn');
    btn.textContent = 'جاري الاتصال...';
    btn.disabled    = true;
    $('lkStatus').textContent = Device.needsProxy
      ? 'وضع iOS/HTTPS — جاري البحث عن مسار آمن...'
      : 'جاري الاتصال بالسيرفر...';
    try {
      const d = await Bridge.fetchJSON(SrvReg.apiUrl('get_live_categories'));
      if (!Array.isArray(d)) throw new Error('bad_response');
      S.liveCats = d;
      Cache.saveSession();
      $('lkStatus').textContent = '✓ تم الاتصال بنجاح';
      setTimeout(() => App.boot(), 400);
    } catch(e) {
      btn.textContent = 'دخول'; btn.disabled = false;
      $('lkStatus').textContent = '';
      showErr('pinErr', 'تعذّر الاتصال. تحقق من الإنترنت', 5000);
    }
  },

  async autoLogin() {
    if (!Cache.loadSession()) return false;
    try {
      const d = await Bridge.fetchJSON(SrvReg.apiUrl('get_live_categories'));
      if (Array.isArray(d) && d.length) { S.liveCats = d; return true; }
      return false;
    } catch(_) {
      // Try from disk cache — offline first
      Loader._loadFromDisk();
      return S.liveCats.length > 0;
    }
  },

  logout() {
    U.vibe(12);
    Cache.clearSession();
    GuestTimer.stopPlayback();
    if ($('pm').classList.contains('on')) Player.close();
    $('app').classList.remove('on');
    $('lockScreen').classList.add('on');
    $('pinIn').value = '';
    $('pinBtn').textContent = 'دخول'; $('pinBtn').disabled = false;
    $('lkStatus').textContent = '';
  },
};

/* ─── APP ─── */
const App = {
  boot() {
    $('lockScreen').classList.remove('on');
    $('app').classList.add('on');
    $('navU').textContent = SrvReg.username.slice(0, 14) + '…';
    GuestTimer.load();
    U.updateGuestBanner();
    TMDB.trending();
    TMDB.popular();
    Content.renderTab('live');
    Loader.loadAll();
  },

  switchTab(t) {
    U.vibe(8);
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === `v-${t}`));
    Content.renderTab(t);
  },
};

/* ─── HELPERS ─── */
function catRow(id, ico, name) {
  return `<div class="cat-row" data-id="${esc(id)}">
    <div class="cr-ico">${ico}</div>
    <div class="cr-name">${esc(name)}</div>
    <div class="cr-arr">›</div>
  </div>`;
}

function filterGrid(q, gid) {
  const el = $(gid); if (!el) return;
  const ql = q.toLowerCase();
  el.querySelectorAll('[data-name]').forEach(c => {
    c.style.display = c.dataset.name.includes(ql) ? '' : 'none';
  });
}

function showErr(id, msg, ms = 3000) {
  const el = $(id);
  el.textContent = msg; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), ms);
}

/* ─── PWA ─── */
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); _deferredPrompt = e;
  if (!localStorage.getItem('pwa_dismissed')) {
    setTimeout(() => $('installBanner')?.classList.add('show'), 3000);
  }
});
$('installBtn')?.addEventListener('click', async () => {
  if (!_deferredPrompt) {
    // iOS: show instructions
    U.toast('في Safari: اضغط على "مشاركة" ثم "إضافة للشاشة الرئيسية"', 5000);
    return;
  }
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  if (outcome === 'accepted') U.toast('✅ تم إضافة TOTV+ للشاشة الرئيسية');
  _deferredPrompt = null;
  $('installBanner')?.classList.remove('show');
});
$('installClose')?.addEventListener('click', () => {
  $('installBanner')?.classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
});
// iOS: auto-show hint on first load
if (Device.isIOS && !window.navigator.standalone && !localStorage.getItem('pwa_dismissed')) {
  setTimeout(() => $('installBanner')?.classList.add('show'), 4000);
}

/* ─── DYNAMIC PWA MANIFEST ─── */
(function() {
  const c = document.createElement('canvas'); c.width = 512; c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#050505'; x.beginPath();
  x.roundRect?.(0, 0, 512, 512, 100) || x.rect(0, 0, 512, 512); x.fill();
  x.strokeStyle = 'rgba(245,197,24,0.4)'; x.lineWidth = 10;
  x.beginPath(); x.roundRect?.(12, 12, 488, 488, 88) || x.rect(12, 12, 488, 488); x.stroke();
  x.fillStyle = '#F5C518'; x.font = '900 120px Arial'; x.textAlign = 'center'; x.fillText('TO', 256, 290);
  x.fillStyle = '#fff';    x.font = '900 80px Arial';  x.fillText('TV+', 256, 395);
  const icon = c.toDataURL('image/png');
  const m = {
    name: 'TOTV+ بريميوم', short_name: 'TOTV+',
    start_url: './', display: 'standalone', orientation: 'portrait',
    background_color: '#000', theme_color: '#050505',
    lang: 'ar', dir: 'rtl',
    icons: [{ src: icon, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }],
  };
  const b = new Blob([JSON.stringify(m)], { type: 'application/manifest+json' });
  const l = document.createElement('link');
  l.rel = 'manifest'; l.href = URL.createObjectURL(b); document.head.appendChild(l);
  const at = document.querySelector('link[rel="apple-touch-icon"]');
  if (at) at.href = icon;
})();

/* ─── SERVICE WORKER (inline) ─── */
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'totv-v3';
    const PRECACHE = ['./'];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE)).catch(()=>{}));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      const url = new URL(e.request.url);
      // Don't cache API / stream requests
      if (url.pathname.includes('player_api') || url.pathname.includes('/live/') ||
          url.pathname.includes('/movie/') || url.pathname.includes('/series/')) return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          if (res.ok && e.request.method === 'GET' && !url.pathname.includes('api')) {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return res;
        }).catch(() => caches.match('./') || new Response('Offline', {status: 503})))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob))
    .catch(() => {}); // silent fail
}

/* ─── EVENT SETUP ─── */
function setupEvents() {
  $('pinBtn').onclick  = () => Auth.checkPin();
  $('pinIn').onkeydown = e => { if (e.key === 'Enter') Auth.checkPin(); };
  $('logoutBtn').onclick  = () => Auth.logout();
  $('closePBtn').onclick  = () => Player.close();
  $('refreshBtn').onclick = () => {
    Cache.clearSession();
    Loader.loadAll(true);
    U.toast('جاري تحديث البيانات...');
  };
  $('subClose').onclick = () => $('subSheet').classList.remove('on');
  $('subSheet').onclick = e => { if (e.target === $('subSheet')) $('subSheet').classList.remove('on'); };
  $('guestBanner').onclick = () => showSubSheet();

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => App.switchTab(t.dataset.t));
  });

  window.addEventListener('popstate', () => {
    if ($('pm').classList.contains('on')) Player.close();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if ($('pm').classList.contains('on')) Player.close();
      if ($('subSheet').classList.contains('on')) $('subSheet').classList.remove('on');
    }
  });

  // Prevent pull-to-refresh on iOS
  let ty = 0;
  document.addEventListener('touchstart', e => { ty = e.touches[0].pageY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    const body = document.querySelector('.abody');
    if (body && body.scrollTop === 0 && e.touches[0].pageY > ty) e.preventDefault();
  }, { passive: false });

  // Lock screen on context menu (video/cards)
  document.addEventListener('contextmenu', e => {
    if (e.target.matches('video, .ch-card, .vod-card, .tmdb-card')) e.preventDefault();
  });
}

/* ─── ENTRY POINT ─── */
window.addEventListener('load', async () => {
  SrvReg.init();
  setupEvents();
  console.log(`[TOTV+] Protocol: ${location.protocol} | Proxy: ${Device.needsProxy} | iOS: ${Device.isIOS}`);

  const ok = await Auth.autoLogin();
  setTimeout(() => {
    $('splash').classList.add('hide');
    if (ok) {
      App.boot();
    } else {
      $('lockScreen').classList.add('on');
      setTimeout(() => $('pinIn').focus(), 300);
    }
  }, 1800);
});

// Expose to global scope for inline handlers
window.Loader = Loader;
</script>
