<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOTV+">
<meta name="theme-color" content="#000000">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Content-Security-Policy" content="
  default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
  media-src * blob: data:;
  img-src * data: blob:;
">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="Icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="Icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="Icon-180.png">
<link rel="apple-touch-icon" href="Icon-180.png">
<link rel="manifest" href="manifest.json">

<title>TOTV+</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<!-- Video.js CSS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.1/video-js.min.css" rel="stylesheet">

<!-- Video.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.1/video.min.js"></script>

<!-- HLS.js — for non-Safari browsers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

<style>
/* ════════════════════════════════════════════
   BASE RESET
════════════════════════════════════════════ */
*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
:root{
  --gold:#FFD700;--gold-d:#B8860B;--gold-l:#FFE44D;
  --glow:rgba(255,215,0,.3);
  --bg:#000;--s1:#0e0e0e;--s2:#161616;--s3:#1e1e1e;
  --glass:rgba(255,255,255,.05);--gb:rgba(255,255,255,.09);
  --txt:#fff;--dim:#999;--dimmer:#555;
  --r:14px;--r3:26px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html{
  -webkit-text-size-adjust:100%;
  height:100%;overflow:hidden;
  scroll-behavior:smooth;
}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);color:var(--txt);
  overflow:hidden;height:100%;
  position:fixed;width:100%;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ════════════════════════════════════════════
   SPLASH
════════════════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,.13) 0%,#000 60%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:26px;
  transition:opacity .7s ease,transform .7s ease;
}
#splash.hide{opacity:0;pointer-events:none;transform:scale(.96)}
.sp-icon{
  width:90px;height:90px;border-radius:22px;
  box-shadow:0 0 50px var(--glow),0 20px 40px rgba(0,0,0,.6);
  animation:iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.sp-brand{
  font-size:3rem;font-weight:900;letter-spacing:5px;
  background:linear-gradient(135deg,#fff 0%,var(--gold) 55%,var(--gold-l) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sp-ring{
  width:50px;height:50px;
  border:4px solid rgba(255,215,0,.15);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;
}
.sp-txt{font-size:.82rem;color:var(--dimmer);letter-spacing:2px;animation:blink 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* ════════════════════════════════════════════
   SCREEN SYSTEM
════════════════════════════════════════════ */
.screen{
  display:none;min-height:100svh;
  align-items:center;justify-content:center;
  padding:20px;position:fixed;inset:0;z-index:100;
}
.screen.on{display:flex}

/* ════════════════════════════════════════════
   LOCK SCREEN
════════════════════════════════════════════ */
#lockScreen{
  background:radial-gradient(ellipse at 50% -5%,rgba(255,215,0,.14) 0%,transparent 65%),#000;
  padding-top:var(--st);padding-bottom:var(--sb);
}
.lk-card{
  background:var(--s1);
  border:1px solid rgba(255,215,0,.18);
  border-radius:var(--r3);
  padding:50px 42px;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.9),0 0 0 1px rgba(255,215,0,.05),
             inset 0 1px 0 rgba(255,255,255,.03);
  animation:cIn .45s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
@keyframes cIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}

.lk-icon-wrap{
  width:72px;height:72px;border-radius:18px;overflow:hidden;
  margin:0 auto 20px;
  box-shadow:0 10px 30px var(--glow);
}
.lk-icon-wrap img{width:100%;height:100%;display:block;object-fit:cover}

.lk-title{
  font-size:1.65rem;font-weight:900;text-align:center;margin-bottom:5px;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lk-sub{font-size:.88rem;color:var(--dim);text-align:center;margin-bottom:28px;line-height:1.6}

.dots{display:flex;justify-content:center;gap:8px;margin-bottom:26px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gb);transition:all .3s}
.dot.on{background:var(--gold);transform:scale(1.3);box-shadow:0 0 12px var(--glow)}
.dot.done{background:rgba(255,215,0,.45)}

/* Fields */
.fwrap{position:relative;margin-bottom:14px}
.fwrap .ico{
  position:absolute;top:50%;right:15px;transform:translateY(-50%);
  font-size:1rem;color:var(--dim);pointer-events:none;
}
.fwrap input{
  width:100%;background:var(--s2);border:1px solid var(--gb);
  border-radius:var(--r);padding:15px 44px 15px 14px;
  color:var(--txt);font-size:1rem;font-family:'Cairo',sans-serif;
  outline:none;transition:all .25s;-webkit-appearance:none;appearance:none;
}
.fwrap input:focus{
  border-color:rgba(255,215,0,.6);
  box-shadow:0 0 0 4px rgba(255,215,0,.1);
  background:rgba(22,22,22,.95);
}
.fwrap input::placeholder{color:var(--dimmer)}

/* Button */
.lk-btn{
  width:100%;
  background:linear-gradient(135deg,var(--gold-d) 0%,var(--gold) 55%,var(--gold-l) 100%);
  color:#000;border:none;border-radius:var(--r);
  padding:16px;font-size:1rem;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:all .28s;box-shadow:0 8px 24px var(--glow);margin-top:6px;
  position:relative;overflow:hidden;
}
.lk-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.3),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.lk-btn:active::before{transform:translateX(100%)}
.lk-btn:active{transform:scale(.97)}
.lk-btn:disabled{opacity:.6;cursor:wait;transform:none}

/* Error */
.lk-err{
  background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);
  border-radius:var(--r);padding:11px 15px;font-size:.86rem;color:#ff6b6b;
  text-align:center;margin-top:12px;display:none;
  animation:shake .4s cubic-bezier(.36,.07,.19,.97);
}
.lk-err.on{display:block}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%,45%,75%{transform:translateX(-8px)}
  30%,60%,90%{transform:translateX(8px)}
}

/* ════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════ */
#app{
  display:none;flex-direction:column;
  height:100vh;height:100svh;
  position:fixed;inset:0;background:var(--bg);
}
#app.on{display:flex}

/* Nav */
.anav{
  background:rgba(10,10,10,.96);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid rgba(255,215,0,.1);
  padding:10px 16px;
  padding-top:calc(var(--st) + 10px);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.anav-logo{width:34px;height:34px;border-radius:9px;object-fit:cover;flex-shrink:0}
.anav-brand{
  font-size:1.3rem;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.anav-space{flex:1}
.anav-user{font-size:.76rem;color:var(--dim);display:flex;align-items:center;gap:5px;max-width:100px;overflow:hidden}
.anav-user span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:#4ade80;box-shadow:0 0 7px #4ade80;
  animation:pdot 2s ease-in-out infinite;
}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
.out-btn{
  background:var(--glass);border:1px solid var(--gb);
  border-radius:10px;color:var(--dim);font-size:.76rem;
  padding:6px 12px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .22s;
  flex-shrink:0;
}
.out-btn:active{color:#ff6b6b;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.07);transform:scale(.95)}

/* Tabs */
.tabs{
  display:flex;gap:5px;padding:8px 13px;overflow-x:auto;scrollbar-width:none;
  background:var(--s1);border-bottom:1px solid rgba(255,255,255,.055);
  -webkit-overflow-scrolling:touch;flex-shrink:0;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;background:transparent;border:1px solid transparent;
  border-radius:50px;padding:8px 16px;color:var(--dim);
  font-size:.85rem;font-weight:600;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:all .22s;white-space:nowrap;
}
.tab:active{transform:scale(.95)}
.tab.on{background:rgba(255,215,0,.13);border-color:rgba(255,215,0,.38);color:var(--gold)}

/* Body */
.abody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.view{display:none;padding:16px 14px 100px}
.view.on{display:block}

/* ════════════════════════════════════════════
   CONTENT COMPONENTS
════════════════════════════════════════════ */
.cat-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cat-hd-title{font-size:1.15rem;font-weight:700}
.cnt-badge{font-size:.74rem;color:var(--dim);background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:2px 10px}
.srch{flex:1;min-width:180px;position:relative}
.srch input{
  width:100%;background:var(--s2);border:1px solid var(--gb);border-radius:50px;
  padding:9px 14px 9px 38px;color:var(--txt);font-size:.85rem;font-family:'Cairo',sans-serif;
  outline:none;transition:all .22s;-webkit-appearance:none;
}
.srch input:focus{border-color:rgba(255,215,0,.45);box-shadow:0 0 0 3px rgba(255,215,0,.09)}
.srch::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}

.cat-list{display:flex;flex-direction:column;gap:7px}
.cat-row{
  background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all .22s;animation:fadeUp .4s ease backwards;
}
.cat-row:active{border-color:rgba(255,215,0,.38);background:rgba(255,215,0,.05);transform:translateX(-4px) scale(.99)}
.cat-row:nth-child(1){animation-delay:.03s}.cat-row:nth-child(2){animation-delay:.06s}
.cat-row:nth-child(3){animation-delay:.09s}.cat-row:nth-child(4){animation-delay:.12s}
.cat-row:nth-child(n+5){animation-delay:.15s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.cr-ico{font-size:1.3rem;flex-shrink:0}
.cr-name{flex:1;font-size:.95rem;font-weight:700}
.cr-arr{color:var(--dimmer);font-size:1.1rem;flex-shrink:0}

.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
.ch-card{
  background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);
  padding:14px 10px;text-align:center;cursor:pointer;position:relative;overflow:hidden;
  transition:all .28s;
}
.ch-card:active{border-color:rgba(255,215,0,.5);transform:scale(.97);box-shadow:0 10px 28px rgba(0,0,0,.55)}
.ch-card.playing{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,0,.22)}
.ch-logo{width:58px;height:58px;border-radius:12px;object-fit:contain;margin:0 auto 9px;background:var(--s3);padding:3px;display:block}
.ch-name{font-size:.74rem;font-weight:600;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.live-tag{position:absolute;top:5px;right:5px;background:#ff3b30;color:#fff;font-size:.57rem;font-weight:800;padding:2px 6px;border-radius:50px;letter-spacing:.4px}

.vod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:13px}
.vod-card{cursor:pointer;transition:transform .28s;position:relative}
.vod-card:active{transform:translateY(-6px) scale(.98)}
.vod-poster{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--s3);transition:box-shadow .28s}
.vod-card:active .vod-poster{box-shadow:0 16px 40px rgba(0,0,0,.85),0 0 0 2px var(--gold)}
.vod-score{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.85);border:1px solid rgba(255,215,0,.3);border-radius:6px;padding:2px 7px;font-size:.66rem;font-weight:700;color:var(--gold)}
.vod-name{font-size:.74rem;font-weight:600;margin-top:7px;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.back-btn{
  display:inline-flex;align-items:center;gap:7px;background:var(--glass);
  border:1px solid var(--gb);border-radius:50px;padding:7px 15px;
  color:var(--dim);font-size:.84rem;cursor:pointer;font-family:'Cairo',sans-serif;
  transition:all .22s;margin-bottom:14px;
}
.back-btn:active{color:var(--gold);border-color:rgba(255,215,0,.3);transform:scale(.95)}

.ldr{display:flex;flex-direction:column;align-items:center;gap:14px;padding:55px 20px}
.ldr-ring{width:42px;height:42px;border:4px solid rgba(255,215,0,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.ldr-txt{font-size:.83rem;color:var(--dim)}
.mpty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:55px 20px;text-align:center}
.mpty-ico{font-size:2.8rem;opacity:.65}
.mpty-txt{font-size:.88rem;color:var(--dim);line-height:1.7;white-space:pre-line;max-width:290px}

/* ════════════════════════════════════════════
   PLAYER MODAL — Full iOS-safe
════════════════════════════════════════════ */
.pmoda{display:none;position:fixed;inset:0;background:#000;z-index:2000;flex-direction:column}
.pmoda.on{display:flex;animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.ptop{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;padding-top:calc(var(--st) + 11px);
  background:linear-gradient(180deg,rgba(0,0,0,.97) 0%,transparent 100%);
  position:absolute;top:0;left:0;right:0;z-index:20;
}
.pbk{
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.14);color:#fff;font-size:1.35rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s;flex-shrink:0;
}
.pbk:active{background:rgba(255,215,0,.22);border-color:var(--gold);color:var(--gold);transform:scale(.94)}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:.72rem;color:var(--dim);margin-top:2px}

.pwrap{
  flex:1;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
  /* IMPORTANT: allow native video controls full area */
}

/* The actual video element — positioned to fill whole pwrap */
#vplayer{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;background:#000;
  /* iOS: allow native fullscreen */
  -webkit-playsinline:none;
}

/* Video.js gold theme */
.video-js{width:100%!important;height:100%!important;background:#000!important}
.vjs-big-play-button{
  border-radius:50%!important;width:70px!important;height:70px!important;line-height:70px!important;
  background:rgba(255,215,0,.94)!important;border:none!important;
  left:50%!important;top:50%!important;transform:translate(-50%,-50%)!important;
  box-shadow:0 0 40px var(--glow)!important;
}
.vjs-big-play-button .vjs-icon-placeholder::before{color:#000!important;font-size:1.9rem!important}
.video-js .vjs-control-bar{
  background:linear-gradient(0deg,rgba(0,0,0,.94) 0%,transparent 100%)!important;
  padding-bottom:calc(var(--sb) + 8px)!important;height:auto!important;
}
.video-js .vjs-play-progress{background:var(--gold)!important}
.video-js .vjs-volume-level{background:var(--gold)!important}
.video-js .vjs-slider{background:rgba(255,255,255,.18)!important}
.video-js .vjs-load-progress{background:rgba(255,255,255,.22)!important}

/* Buffer overlay */
.bufov{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:15;pointer-events:none;
}
.bufov.on{display:flex}
.buf-ring{width:52px;height:52px;border:4px solid rgba(255,215,0,.18);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
.buf-txt{font-size:.82rem;color:rgba(255,255,255,.7)}

/* Error overlay */
.errov{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:15px;
  background:rgba(0,0,0,.93);z-index:16;text-align:center;padding:24px;
}
.errov.on{display:flex}
.err-ico{font-size:3.2rem}
.err-msg{font-size:.9rem;color:var(--dim);line-height:1.7;max-width:300px}
.retry-btn{
  background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));
  color:#000;border:none;border-radius:50px;padding:12px 30px;
  font-size:.92rem;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:all .22s;margin-top:5px;box-shadow:0 6px 20px var(--glow);
}
.retry-btn:active{transform:scale(.96)}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--sb) + 28px);left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--s2);border:1px solid var(--gb);border-radius:50px;
  padding:9px 20px;font-size:.84rem;color:var(--txt);z-index:9000;opacity:0;
  transition:all .28s;pointer-events:none;white-space:nowrap;
  box-shadow:0 10px 28px rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════ */
@media(max-width:480px){
  .lk-card{padding:36px 22px}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr))}
  .vod-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr))}
  .cat-hd{flex-direction:column;align-items:stretch}
  .srch{min-width:100%}
}
@media(max-width:360px){
  .ch-grid{grid-template-columns:repeat(3,1fr)}
  .vod-grid{grid-template-columns:repeat(3,1fr)}
}
/* Landscape — give player more height */
@media(orientation:landscape) and (max-height:500px){
  .ptop{padding-top:calc(env(safe-area-inset-top,0px) + 6px);padding-bottom:4px}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="sp-icon" src="Icon-180.png" alt="TOTV+">
  <div class="sp-brand">TOTV+</div>
  <div class="sp-ring"></div>
  <div class="sp-txt">جاري التهيئة...</div>
</div>

<!-- LOCK SCREEN -->
<div class="screen" id="lockScreen">
  <div class="lk-card">
    <div class="lk-icon-wrap">
      <img src="Icon-180.png" alt="TOTV+">
    </div>
    <div class="lk-title">TOTV+ Premium</div>

    <div class="dots">
      <div class="dot on" id="d1"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';
/* ══════════════════════════════════════════════════════════
   CONFIG — server stored split, joined only at runtime
══════════════════════════════════════════════════════════ */
const CFG = {
  PIN: '1212',
  // Base URL — split to deter trivial grep / inspector search
  // Joins to: http://silka.m3um9xplus.org:2052
  SRV_A: 'http://silka.m3um9xplus',
  SRV_B: 'org:2052',
  TIMEOUT:     15000,
  RETRIES:     3,
  RETRY_DELAY: 2000
};

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const S = {
  user:    '',
  pass:    '',
  curUrl:  '',
  curTitle:'',
  cache: { lc:null, ls:{}, mc:null, ms:{}, sc:null, ss:{} }
};

/* ══════════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════════ */
const API = {
  base()  { return CFG.SRV_A + '.' + CFG.SRV_B; },
  url(a,x='') { return `${this.base()}/player_api.php?username=${S.user}&password=${S.pass}&action=${a}${x}`; },
  live(id)    { return `${this.base()}/live/${S.user}/${S.pass}/${id}`; },   // no ext — server decides
  vod(id)     { return `${this.base()}/movie/${S.user}/${S.pass}/${id}.mp4`; },
  ep(id,ext)  { return `${this.base()}/series/${S.user}/${S.pass}/${id}.${ext||'mp4'}`; },

  /**
   * Fetch with timeout + retry.
   * No custom headers → no CORS preflight.
   * Works on http:// served pages (totv.online) without any proxy.
   */
  async fetch(url, tries = CFG.RETRIES) {
    let last;
    for (let i = 0; i < tries; i++) {
      try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), CFG.TIMEOUT);
        const res  = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
        clearTimeout(tid);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const txt = await res.text();
        try { return JSON.parse(txt); } catch(_) { return txt; }
      } catch(e) {
        last = e;
        console.warn(`[API] try ${i+1}/${tries} failed:`, e.message);
        if (i < tries-1) await sleep(CFG.RETRY_DELAY);
      }
    }
    throw last;
  }
};

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ══════════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════════ */
const U = {
  esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  },
  toast(msg, ms=2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('on');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('on'), ms);
  },
  ldr(msg='جاري التحميل...') {
    return `<div class="ldr"><div class="ldr-ring"></div><div class="ldr-txt">${msg}</div></div>`;
  },
  mpty(ico, msg) {
    return `<div class="mpty"><div class="mpty-ico">${ico}</div><div class="mpty-txt">${msg}</div></div>`;
  },
  vibe(p=10) { try { navigator.vibrate?.(p); } catch(_){} }
};

/* ══════════════════════════════════════════════════════════
   SESSION
══════════════════════════════════════════════════════════ */
const Sess = {
  K: '_tv2',
  save(u,p) { try { sessionStorage.setItem(this.K, btoa(u+'|'+p)); } catch(_){} },
  load() {
    try {
      const v = sessionStorage.getItem(this.K);
      if (!v) return null;
      const [u,...pp] = atob(v).split('|');
      return { u, p: pp.join('|') };
    } catch(_){ return null; }
  },
  clear() { try { sessionStorage.removeItem(this.K); } catch(_){} }
};

/* ══════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════ */
const Auth = {
  async checkPin() {
    const val = document.getElementById('pinIn').value.trim();
    if (val !== CFG.PIN) {
      U.vibe([10,50,10,50,10]);
      showErr('pinErr');
      document.getElementById('pinIn').value = '';
      document.getElementById('pinIn').focus();
      return;
    }
    U.vibe(15);
    document.getElementById('s1').style.display = 'none';
    document.getElementById('s2').style.display = 'block';
    document.getElementById('d1').classList.replace('on','done');
    document.getElementById('d2').classList.add('on');

    const sv = Sess.load();
    if (sv) { S.user = sv.u; S.pass = sv.p; await this._verify(); }
    else setTimeout(() => document.getElementById('uIn').focus(), 80);
  },

  async login() {
    const u = document.getElementById('uIn').value.trim();
    const p = document.getElementById('pIn').value.trim();
    if (!u || !p) { U.toast('يرجى إدخال اليوزر والباسورد'); return; }
    const btn = document.getElementById('lBtn');
    btn.textContent = 'جاري التحقق...'; btn.disabled = true;
    S.user = u; S.pass = p;
    try {
      const d = await API.fetch(API.url('get_live_categories'));
      if (!Array.isArray(d)) throw new Error('bad');
      Sess.save(u, p);
      App.boot();
    } catch(e) {
      console.error('[Auth]', e);
      U.vibe([10,50,10,50,10]);
      btn.textContent = 'تسجيل الدخول ←'; btn.disabled = false;
      showErr('lErr');
    }
  },

  async _verify() {
    try {
      const d = await API.fetch(API.url('get_live_categories'));
      if (Array.isArray(d)) { App.boot(); return; }
      throw 0;
    } catch(_) {
      Sess.clear();
      setTimeout(() => document.getElementById('uIn').focus(), 80);
    }
  },

  logout() {
    U.vibe(12);
    Sess.clear();
    S.user = ''; S.pass = '';
    S.cache = { lc:null,ls:{},mc:null,ms:{},sc:null,ss:{} };
    if (document.getElementById('pm').classList.contains('on')) Player.close();
    document.getElementById('app').classList.remove('on');
    document.getElementById('lockScreen').classList.add('on');
    document.getElementById('s2').style.display = 'block';
    document.getElementById('s1').style.display = 'none';
    document.getElementById('uIn').value = '';
    document.getElementById('pIn').value = '';
    const btn = document.getElementById('lBtn');
    btn.textContent = 'تسجيل الدخول ←'; btn.disabled = false;
  }
};

function showErr(id, ms=3000) {
  const el = document.getElementById(id);
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), ms);
}

/* ══════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════ */
const App = {
  boot() {
    document.getElementById('lockScreen').classList.remove('on');
    document.getElementById('app').classList.add('on');
    document.getElementById('navU').textContent = S.user;
    Content.loadTab('live');
  },
  switchTab(t) {
    U.vibe(8);
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
    document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === `v-${t}`));
    Content.loadTab(t);
  }
};

/* ══════════════════════════════════════════════════════════
   CONTENT
══════════════════════════════════════════════════════════ */
const ICO = {
  live:   ['📺','🎬','⚽','📰','🎵','🌍','🏠','👶','🎮','📡','🔴','🎭','🌐','🏆','🎯','🔵','🟢','🎪','🌺','🏅'],
  movie:  ['🎬','🔥','🏆','😂','💥','❤️','👻','🚀','🌊','🎭','🕵️','🌍','🎵','🏋️','🌈','🎯','🧨','🦸','💀','🤠'],
  series: ['📺','🔥','😂','💕','🔮','🕵️','🚀','🏆','🌍','🎭','👨‍👩‍👧','🌙','🎵','😱','🌊','🧩','👑','🌺','🤖','🧟']
};

const Content = {
  loadTab(t) {
    if (t==='live')   this.loadLiveCats();
    if (t==='movies') this.loadMovCats();
    if (t==='series') this.loadSerCats();
  },

  /* ── LIVE ── */
  async loadLiveCats() {
    const el = ge('c-live');
    if (S.cache.lc) { this._rLiveCats(S.cache.lc, el); return; }
    el.innerHTML = U.ldr('جاري جلب القنوات...');
    try { S.cache.lc = await API.fetch(API.url('get_live_categories')); this._rLiveCats(S.cache.lc, el); }
    catch(_) { el.innerHTML = U.mpty('📡','تعذّر جلب القنوات.\nتحقق من الاتصال بالإنترنت'); }
  },
  _rLiveCats(cats, el) {
    if (!cats?.length) { el.innerHTML = U.mpty('📡','لا توجد فئات متاحة'); return; }
    let h = hd('📡 القنوات الحية', cats.length, 'فئة') + '<div class="cat-list">';
    cats.forEach((c,i) => h += catRow(c.category_id, ICO.live[i%ICO.live.length], c.category_name));
    h += '</div>'; el.innerHTML = h;
    el.querySelectorAll('.cat-row').forEach(r => r.addEventListener('click', () =>
      this.loadLiveStreams(r.dataset.id, r.querySelector('.cr-name').textContent)));
  },
  async loadLiveStreams(cid, cname) {
    U.vibe(10); const el = ge('c-live');
    el.innerHTML = U.ldr(`جاري جلب قنوات ${cname}...`);
    try {
      S.cache.ls[cid] = S.cache.ls[cid] || await API.fetch(API.url('get_live_streams',`&category_id=${cid}`));
      this._rLiveStr(S.cache.ls[cid], cname, el, cid);
    } catch(_) { el.innerHTML = U.mpty('📡','تعذّر جلب القنوات.'); }
  },
  _rLiveStr(streams, cname, el, cid) {
    if (!streams?.length) { el.innerHTML = U.mpty('📡','لا توجد قنوات في هذه الفئة'); return; }
    const gid = 'lg'+cid;
    let h = `<button class="back-btn" id="bk-live">‹ رجوع</button>
      ${hd(U.esc(cname), streams.length, '', gid)}
      <div class="ch-grid" id="${gid}">`;
    streams.forEach(s => {
      h += `<div class="ch-card" data-sid="${s.stream_id}" data-name="${U.esc(s.name).toLowerCase()}">
        <div class="live-tag">LIVE</div>
        ${s.stream_icon
          ? `<img src="${U.esc(s.stream_icon)}" class="ch-logo" onerror="this.style.display='none'" loading="lazy" alt="">`
          : `<div class="ch-logo" style="display:flex;align-items:center;justify-content:center;font-size:1.4rem">📺</div>`}
        <div class="ch-name">${U.esc(s.name)}</div>
      </div>`;
    });
    h += '</div>'; el.innerHTML = h;
    ge('bk-live').onclick = () => this.loadLiveCats();
    el.querySelector(`[data-grid="${gid}"]`).oninput = e => flt(e.target.value, gid);
    el.querySelectorAll('.ch-card').forEach(c => c.addEventListener('click', () =>
      Player.playLive(c.dataset.sid, c.querySelector('.ch-name').textContent)));
  },

  /* ── MOVIES ── */
  async loadMovCats() {
    const el = ge('c-movies');
    if (S.cache.mc) { this._rMovCats(S.cache.mc, el); return; }
    el.innerHTML = U.ldr('جاري جلب الأفلام...');
    try { S.cache.mc = await API.fetch(API.url('get_vod_categories')); this._rMovCats(S.cache.mc, el); }
    catch(_) { el.innerHTML = U.mpty('🎬','تعذّر جلب الأفلام.'); }
  },
  _rMovCats(cats, el) {
    if (!cats?.length) { el.innerHTML = U.mpty('🎬','لا توجد فئات'); return; }
    let h = hd('🎬 فئات الأفلام', cats.length, 'فئة') + '<div class="cat-list">';
    cats.forEach((c,i) => h += catRow(c.category_id, ICO.movie[i%ICO.movie.length], c.category_name));
    h += '</div>'; el.innerHTML = h;
    el.querySelectorAll('.cat-row').forEach(r => r.addEventListener('click', () =>
      this.loadMovStreams(r.dataset.id, r.querySelector('.cr-name').textContent)));
  },
  async loadMovStreams(cid, cname) {
    U.vibe(10); const el = ge('c-movies');
    el.innerHTML = U.ldr(`جاري جلب أفلام ${cname}...`);
    try {
      S.cache.ms[cid] = S.cache.ms[cid] || await API.fetch(API.url('get_vod_streams',`&category_id=${cid}`));
      this._rVodGrid(S.cache.ms[cid], cname, el, 'movie', cid);
    } catch(_) { el.innerHTML = U.mpty('🎬','تعذّر جلب الأفلام.'); }
  },

  /* ── SERIES ── */
  async loadSerCats() {
    const el = ge('c-series');
    if (S.cache.sc) { this._rSerCats(S.cache.sc, el); return; }
    el.innerHTML = U.ldr('جاري جلب المسلسلات...');
    try { S.cache.sc = await API.fetch(API.url('get_series_categories')); this._rSerCats(S.cache.sc, el); }
    catch(_) { el.innerHTML = U.mpty('📺','تعذّر جلب المسلسلات.'); }
  },
  _rSerCats(cats, el) {
    if (!cats?.length) { el.innerHTML = U.mpty('📺','لا توجد فئات'); return; }
    let h = hd('📺 فئات المسلسلات', cats.length, 'فئة') + '<div class="cat-list">';
    cats.forEach((c,i) => h += catRow(c.category_id, ICO.series[i%ICO.series.length], c.category_name));
    h += '</div>'; el.innerHTML = h;
    el.querySelectorAll('.cat-row').forEach(r => r.addEventListener('click', () =>
      this.loadSerStreams(r.dataset.id, r.querySelector('.cr-name').textContent)));
  },
  async loadSerStreams(cid, cname) {
    U.vibe(10); const el = ge('c-series');
    el.innerHTML = U.ldr(`جاري جلب مسلسلات ${cname}...`);
    try {
      S.cache.ss[cid] = S.cache.ss[cid] || await API.fetch(API.url('get_series',`&category_id=${cid}`));
      this._rVodGrid(S.cache.ss[cid], cname, el, 'series', cid);
    } catch(_) { el.innerHTML = U.mpty('📺','تعذّر جلب المسلسلات.'); }
  },

  /* ── VOD GRID ── */
  _rVodGrid(streams, cname, el, type, cid) {
    if (!streams?.length) { el.innerHTML = U.mpty('🎬','لا توجد محتويات'); return; }
    const bkId = 'bk-'+type+cid;
    const gid  = 'vg'+cid;
    let h = `<button class="back-btn" id="${bkId}">‹ رجوع</button>
      ${hd(U.esc(cname), streams.length, '', gid)}
      <div class="vod-grid" id="${gid}">`;
    streams.forEach(s => {
      const img = s.stream_icon||s.cover||s.movie_image||'';
      const sc  = s.rating ? parseFloat(s.rating).toFixed(1) : '';
      const sid = s.stream_id||s.series_id;
      h += `<div class="vod-card" data-sid="${sid}" data-type="${type}" data-name="${U.esc(s.name).toLowerCase()}">
        ${sc?`<div class="vod-score">⭐ ${sc}</div>`:''}
        <img src="${U.esc(img)}" class="vod-poster" onerror="this.src=''" loading="lazy" alt="${U.esc(s.name)}">
        <div class="vod-name">${U.esc(s.name)}</div>
      </div>`;
    });
    h += '</div>'; el.innerHTML = h;
    ge(bkId).onclick = () => type==='movie' ? this.loadMovCats() : this.loadSerCats();
    el.querySelector(`[data-grid="${gid}"]`).oninput = e => flt(e.target.value, gid);
    el.querySelectorAll('.vod-card').forEach(c => c.addEventListener('click', () => {
      const nm = c.querySelector('.vod-name').textContent;
      if (c.dataset.type==='movie') Player.playVod(c.dataset.sid, nm);
      else this.loadSerInfo(c.dataset.sid, nm);
    }));
  },

  /* ── SERIES EPISODES ── */
  async loadSerInfo(sid, sname) {
    U.vibe(10); const el = ge('c-series');
    el.innerHTML = U.ldr('جاري جلب الحلقات...');
    try {
      const d = await API.fetch(API.url('get_series_info',`&series_id=${sid}`));
      this._rSerInfo(d, sname, el);
    } catch(_) { el.innerHTML = U.mpty('📺','تعذّر جلب الحلقات.'); }
  },
  _rSerInfo(data, sname, el) {
    const info = data.info||{}, eps = data.episodes||{};
    const cover = info.cover||info.movie_image||'';
    let h = `<button class="back-btn" id="bk-ser-i">‹ رجوع</button>
      <div style="display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;align-items:flex-start">
        ${cover?`<img src="${U.esc(cover)}" style="width:88px;border-radius:12px;object-fit:cover;flex-shrink:0" loading="lazy" onerror="this.remove()">`:''}
        <div>
          <div style="font-size:1.1rem;font-weight:700;margin-bottom:5px">${U.esc(sname)}</div>
          <div style="font-size:.79rem;color:var(--dim);line-height:1.7">${U.esc((info.plot||'').slice(0,200))}</div>
        </div>
      </div>`;
    const seasons = Object.keys(eps);
    if (!seasons.length) { el.innerHTML = h + U.mpty('📺','لا توجد حلقات متاحة'); return; }
    seasons.forEach(sn => {
      h += `<div style="margin-bottom:20px">
        <div style="font-size:.95rem;font-weight:700;color:var(--gold);padding:7px 0;margin-bottom:10px;border-bottom:1px solid rgba(255,215,0,.14)">
          الموسم ${sn}</div><div class="ch-grid">`;
      (eps[sn]||[]).forEach(ep => {
        const thumb = ep.info?.movie_image||'';
        const ext   = ep.container_extension||'mp4';
        h += `<div class="ch-card ep-card" data-eid="${ep.id}" data-ext="${U.esc(ext)}" data-epn="${ep.episode_num}" data-sname="${U.esc(sname)}">
          ${thumb?`<img src="${U.esc(thumb)}" class="ch-logo" style="height:44px;object-fit:cover;border-radius:8px" loading="lazy" onerror="this.remove()">`
                 :`<div style="font-size:1.45rem;margin-bottom:7px">▶️</div>`}
          <div class="ch-name">حلقة ${ep.episode_num}</div>
        </div>`;
      });
      h += '</div></div>';
    });
    el.innerHTML = h;
    ge('bk-ser-i').onclick = () => this.loadSerCats();
    el.querySelectorAll('.ep-card').forEach(c => c.addEventListener('click', () =>
      Player.playEp(c.dataset.eid, `${c.dataset.sname} — حلقة ${c.dataset.epn}`, c.dataset.ext)));
  }
};

/* ── HTML helpers ── */
const ge = id => document.getElementById(id);
const flt = (q, gid) => {
  const g = ge(gid); if (!g) return;
  const ql = q.toLowerCase();
  g.querySelectorAll('[data-name]').forEach(c => { c.style.display = c.dataset.name.includes(ql)?'':'none'; });
};
const catRow = (id, ico, name) =>
  `<div class="cat-row" data-id="${U.esc(id)}">
    <div class="cr-ico">${ico}</div>
    <div class="cr-name">${U.esc(name)}</div>
    <div class="cr-arr">›</div>
  </div>`;
const hd = (title, cnt, unit='', gridId='') =>
  `<div class="cat-hd">
    <div class="cat-hd-title">${title}</div>
    <div class="cnt-badge">${cnt}${unit?' '+unit:''}</div>
    ${gridId?`<div class="srch"><input type="text" placeholder="بحث..." data-grid="${gridId}"></div>`:''}
  </div>`;

/* ══════════════════════════════════════════════════════════
   PLAYER — iOS-first strategy
   ══════════════════════════════════════════════════════════
   Strategy (in order):
   1. iOS Safari  → native <video> directly (no Video.js, no HLS.js)
                    iOS handles HLS natively via .m3u8
   2. Chrome/FF   → HLS.js + Video.js shell for controls
   3. MP4 / VOD   → Video.js with native mp4 source
══════════════════════════════════════════════════════════ */
const Player = {
  _hls: null,
  _vjs: null,

  playLive(id, name) {
    U.vibe(12);
    // Try m3u8 first; if it fails player retries with .ts
    this.open(API.live(id) + '.m3u8', name, '📡 بث مباشر', 'live', id);
  },
  playVod(id, name) {
    U.vibe(12);
    this.open(API.vod(id), name, '🎬 فيلم', 'vod', null);
  },
  playEp(id, name, ext) {
    U.vibe(12);
    this.open(API.ep(id, ext), name, '📺 مسلسل', 'vod', null);
  },

  open(url, title, sub, type, streamId) {
    S.curUrl   = url;
    S.curTitle = title;
    ge('ptitle').textContent = title;
    ge('psub').textContent   = sub;
    ge('pm').classList.add('on');
    document.body.style.overflow = 'hidden';
    this._build(url, type, streamId);
  },

  _build(url, type, streamId) {
    this._destroyAll();
    this._showBuf(true);
    this._showErr(false);

    const wrap = ge('pwrap');

    /* ── iOS Safari: use plain <video> for maximum compatibility ── */
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    if (isIOS || isSafari) {
      this._buildNative(wrap, url, type, streamId);
    } else {
      this._buildHLS(wrap, url, type, streamId);
    }
  },

  /* ── NATIVE video for iOS Safari ── */
  _buildNative(wrap, url, type, streamId) {
    const vid = document.createElement('video');
    vid.id = 'vplayer';
    vid.setAttribute('playsinline', '');
    vid.setAttribute('webkit-playsinline', '');
    // Allow native fullscreen on iOS
    vid.setAttribute('x-webkit-airplay', 'allow');
    vid.controls = true;
    vid.preload   = 'auto';
    vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;background:#000;object-fit:contain;';

    // Buffer overlay
    const bufEl = this._makeBuf();
    const errEl = this._makeErr(url, type, streamId);

    wrap.appendChild(vid);
    wrap.appendChild(bufEl);
    wrap.appendChild(errEl);

    vid.addEventListener('waiting',    () => this._showBuf(true));
    vid.addEventListener('playing',    () => this._showBuf(false));
    vid.addEventListener('canplay',    () => this._showBuf(false));
    vid.addEventListener('loadeddata', () => this._showBuf(false));
    vid.addEventListener('error', () => {
      // If m3u8 failed, try .ts fallback
      if (url.endsWith('.m3u8') && streamId) {
        const tsUrl = API.live(streamId) + '.ts';
        console.warn('[Player] m3u8 failed, trying .ts:', tsUrl);
        vid.src = tsUrl;
        vid.load();
        vid.play().catch(()=>{});
      } else {
        this._showBuf(false);
        this._showErr(true, vid.error?.message || 'تعذّر تشغيل البث');
      }
    });

    vid.src = url;
    vid.load();
    vid.play().catch(e => {
      console.warn('[Player] autoplay blocked — waiting for user tap:', e.message);
      this._showBuf(false); // show play button implicitly
    });
  },

  /* ── HLS.js for Chrome / Firefox / Desktop ── */
  _buildHLS(wrap, url, type, streamId) {
    const vid = document.createElement('video');
    vid.id = 'vplayer';
    vid.className = 'video-js vjs-default-skin vjs-big-play-centered';
    vid.setAttribute('controls','');
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');

    const bufEl = this._makeBuf();
    const errEl = this._makeErr(url, type, streamId);

    wrap.appendChild(vid);
    wrap.appendChild(bufEl);
    wrap.appendChild(errEl);

    const isM3U8 = /\.m3u8/.test(url) || type === 'live';

    if (isM3U8 && typeof Hls !== 'undefined' && Hls.isSupported()) {
      this._hls = new Hls({
        enableWorker:           true,
        lowLatencyMode:         true,
        backBufferLength:       30,
        maxBufferLength:        60,
        maxMaxBufferLength:     120,
        fragLoadingTimeOut:     20000,
        manifestLoadingTimeOut: 15000,
        levelLoadingTimeOut:    15000,
      });
      this._hls.loadSource(url);
      this._hls.attachMedia(vid);
      this._hls.on(Hls.Events.MANIFEST_PARSED, () => {
        this._showBuf(false);
        vid.play().catch(()=>{});
      });
      this._hls.on(Hls.Events.ERROR, (_, d) => {
        if (!d.fatal) return;
        console.error('[HLS]', d.type, d.details);
        if (d.type === Hls.ErrorTypes.NETWORK_ERROR && url.endsWith('.m3u8') && streamId) {
          // fallback .ts
          const tsUrl = API.live(streamId) + '.ts';
          console.warn('[HLS] switching to .ts fallback');
          this._hls.destroy(); this._hls = null;
          this._hls = new Hls({ enableWorker:true, lowLatencyMode:true });
          this._hls.loadSource(tsUrl);
          this._hls.attachMedia(vid);
        } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
          this._hls.recoverMediaError();
        } else {
          this._showBuf(false);
          this._showErr(true, 'تعذّر تشغيل البث: ' + d.details);
        }
      });
    }

    // Video.js for unified controls
    const vjsOpts = {
      techOrder: ['html5'], controls: true,
      autoplay: isM3U8 ? false : true,
      preload: 'auto', fluid: false, fill: true,
    };
    if (!isM3U8) {
      vjsOpts.sources = [{ src: url, type: url.includes('.mkv') ? 'video/x-matroska' : 'video/mp4' }];
    }

    try {
      this._vjs = videojs('vplayer', vjsOpts);
      this._vjs.on('waiting',    () => this._showBuf(true));
      this._vjs.on('playing',    () => this._showBuf(false));
      this._vjs.on('canplay',    () => this._showBuf(false));
      this._vjs.on('loadeddata', () => this._showBuf(false));
      this._vjs.on('error',      () => {
        this._showBuf(false);
        this._showErr(true, 'تعذّر تشغيل الملف. تأكد من صلاحية الاشتراك.');
      });
    } catch(e) {
      console.error('[VJS] init error:', e);
    }
  },

  /* ── Overlay factories ── */
  _makeBuf() {
    const d = document.createElement('div');
    d.className = 'bufov on'; d.id = 'bufov';
    d.innerHTML = '<div class="buf-ring"></div><div class="buf-txt">جاري التحميل...</div>';
    return d;
  },
  _makeErr(url, type, streamId) {
    const d = document.createElement('div');
    d.className = 'errov'; d.id = 'errov';
    d.innerHTML = `<div class="err-ico">⚠️</div>
      <div class="err-msg" id="ermsg">تعذّر تشغيل البث.</div>
      <button class="retry-btn" id="retryBtn">إعادة المحاولة</button>`;
    setTimeout(() => {
      const rb = ge('retryBtn');
      if (rb) rb.onclick = () => { U.vibe(10); this._build(url, type, streamId); };
    }, 0);
    return d;
  },

  _showBuf(show) {
    const el = ge('bufov');
    if (el) el.classList.toggle('on', show);
  },
  _showErr(show, msg='') {
    const el = ge('errov');
    if (el) el.classList.toggle('on', show);
    if (show && msg) { const m = ge('ermsg'); if (m) m.textContent = msg; }
  },

  _destroyAll() {
    if (this._hls) { try { this._hls.destroy(); } catch(_){} this._hls = null; }
    if (this._vjs) { try { this._vjs.dispose(); } catch(_){} this._vjs = null; }
    const wrap = ge('pwrap');
    while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
  },

  close() {
    U.vibe(8);
    this._destroyAll();
    ge('pm').classList.remove('on');
    document.body.style.overflow = '';
  }
};

/* ══════════════════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════════════════ */
function setupEvents() {
  ge('pinBtn').onclick  = () => Auth.checkPin();
  ge('pinIn').onkeydown = e => { if (e.key==='Enter') Auth.checkPin(); };
  ge('lBtn').onclick    = () => Auth.login();
  ge('uIn').onkeydown   = e => { if (e.key==='Enter') ge('pIn').focus(); };
  ge('pIn').onkeydown   = e => { if (e.key==='Enter') Auth.login(); };
  ge('logoutBtn').onclick = () => Auth.logout();
  ge('closePBtn').onclick = () => Player.close();

  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => App.switchTab(t.dataset.t)));

  window.addEventListener('popstate', () => {
    if (ge('pm').classList.contains('on')) Player.close();
  });
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') Player.close();
  });

  // iOS pull-to-refresh prevention
  let _ty = 0;
  document.addEventListener('touchstart', e => { _ty = e.touches[0].pageY; }, { passive:true });
  document.addEventListener('touchmove', e => {
    const ab = document.querySelector('.abody');
    if (ab && ab.scrollTop===0 && e.touches[0].pageY > _ty) e.preventDefault();
  }, { passive:false });

  document.addEventListener('contextmenu', e => {
    if (e.target.matches('video,.ch-card,.vod-card')) e.preventDefault();
  });
}

/* ══════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  setupEvents();
  setTimeout(() => {
    ge('splash').classList.add('hide');
    ge('lockScreen').classList.add('on');
    ge('pinIn').focus();
  }, 1300);
});
</script>
