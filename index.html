<head>

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23141414'/%3E%3Ctext x='90' y='105' font-family='Arial' font-weight='900' font-size='42' fill='%23E50914' text-anchor='middle'%3ETO%3C/text%3E%3Ctext x='90' y='145' font-family='Arial' font-weight='900' font-size='28' fill='%23fff' text-anchor='middle'%3ETV+%3C/text%3E%3C/svg%3E">

<title>TOTV+</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --accent:#E50914;--accent-d:#B20710;--accent-l:#FF1926;
  --gold:#C6A84A;--gold-l:#E8D48B;
  --bg:#141414;--s1:#181818;--s2:#222;--s3:#2a2a2a;
  --glass:rgba(255,255,255,.06);--gb:rgba(255,255,255,.1);
  --txt:#fff;--txt-2:#e5e5e5;--dim:#8c8c8c;--dimmer:#555;
  --r:8px;--r2:12px;--r3:20px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html{-webkit-text-size-adjust:100%;height:100%;overflow:hidden}
body{
  font-family:'Tajawal','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);
  overflow:hidden;height:100%;position:fixed;width:100%;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
}

/* ═══ INLINE LOGO SVG ═══ */
.app-icon{width:32px;height:32px;flex-shrink:0}
.app-icon-lg{width:64px;height:64px}
.app-icon-splash{width:100px;height:100px}

/* ═══ SPLASH ═══ */
#splash{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity .6s,visibility .6s;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
@keyframes spPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.85}}
.sp-bar-wrap{width:140px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sp-bar{width:0;height:100%;background:var(--accent);border-radius:3px;animation:spLoad 1.5s ease forwards}
@keyframes spLoad{to{width:100%}}
.sp-txt{font-size:.78rem;color:var(--dimmer);letter-spacing:1px}

/* ═══ SCREENS ═══ */
.screen{display:none;min-height:100svh;align-items:center;justify-content:center;padding:20px;position:fixed;inset:0;z-index:100}
.screen.on{display:flex}

/* ═══ LOCK ═══ */
#lockScreen{
  background:#000;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(229,9,20,.1) 0%,transparent 55%);
  padding-top:var(--st);padding-bottom:var(--sb);
}
.lk-card{
  background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r3);padding:44px 34px;width:100%;max-width:400px;
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  animation:cardUp .45s cubic-bezier(.16,1,.3,1);
}
@keyframes cardUp{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.lk-brand{text-align:center;margin-bottom:30px}
.lk-brand svg{margin:0 auto 12px;display:block}
.lk-brand h1{font-size:1.6rem;font-weight:900;letter-spacing:3px;color:#fff}
.lk-brand p{font-size:.82rem;color:var(--dim);margin-top:5px}
.lk-field{position:relative;margin-bottom:14px}
.lk-field input{
  width:100%;background:var(--s3);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r);padding:15px 16px 15px 44px;
  color:var(--txt);font-size:1rem;font-family:'Tajawal',sans-serif;
  outline:none;transition:all .2s;-webkit-appearance:none;
}
.lk-field input:focus{border-color:var(--accent);background:rgba(42,42,42,.9)}
.lk-field input::placeholder{color:var(--dimmer)}
.lk-field .fi{position:absolute;top:50%;right:14px;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.45}
.lk-btn{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:14px;font-size:1rem;font-weight:700;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:all .2s;margin-top:6px;
}
.lk-btn:active{background:var(--accent-d);transform:scale(.98)}
.lk-btn:disabled{opacity:.5;cursor:wait}
.lk-err{
  background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.25);
  border-radius:var(--r);padding:11px 14px;font-size:.82rem;color:var(--accent-l);
  text-align:center;margin-top:12px;display:none;animation:shake .35s;
}
.lk-err.on{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.proto-warn{
  background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.2);
  border-radius:var(--r);padding:12px 14px;margin-top:16px;
  font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.7;text-align:center;display:none;
}
.proto-warn a{color:var(--accent-l);text-decoration:underline;font-weight:700}

/* ═══ APP ═══ */
#app{display:none;flex-direction:column;height:100vh;height:100svh;position:fixed;inset:0;background:var(--bg)}
#app.on{display:flex}
.anav{
  background:rgba(20,20,20,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:10px 14px;padding-top:calc(var(--st) + 10px);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.04);z-index:50;
}
.anav-title{font-size:1.15rem;font-weight:900;letter-spacing:2px;color:var(--accent)}
.anav-sp{flex:1}
.anav-user{font-size:.72rem;color:var(--dim);display:flex;align-items:center;gap:5px}
.anav-user .dot{width:6px;height:6px;border-radius:50%;background:#46d369;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.out-btn{
  background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:var(--r);
  color:var(--dim);font-size:.72rem;padding:5px 12px;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;
}
.out-btn:active{color:var(--accent);border-color:var(--accent)}
.tabs{display:flex;gap:0;background:rgba(20,20,20,.95);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)}
.tab{
  flex:1;background:transparent;border:none;border-bottom:2px solid transparent;
  padding:11px 6px;color:var(--dim);font-size:.8rem;font-weight:600;
  font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.on{color:#fff;border-bottom-color:var(--accent)}
.tab:active{opacity:.7}
.abody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.view{display:none;padding-bottom:80px}.view.on{display:block}

/* ═══ HERO ═══ */
.hero{position:relative;width:100%;height:260px;overflow:hidden;margin-bottom:2px}
@media(min-width:600px){.hero{height:360px}}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s;background-size:cover;background-position:center top}
.hero-slide.active{opacity:1}
.hero-fade{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 0%,rgba(20,20,20,.35) 45%,rgba(20,20,20,.15) 70%,rgba(20,20,20,.5) 100%)}
.hero-content{position:absolute;bottom:24px;right:18px;left:18px;z-index:2}
.hero-title{font-size:1.35rem;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.8);line-height:1.3;margin-bottom:5px}
.hero-meta{font-size:.74rem;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-badge{background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:3px}
.hero-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:3}
.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:all .3s}
.hero-dot.on{background:#fff;width:16px;border-radius:3px}

/* ═══ CONTENT ═══ */
.section{padding:12px 14px 0}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:1rem;font-weight:700}
.section-count{font-size:.7rem;color:var(--dim);background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:2px 9px}
.section-search{width:100%;position:relative;margin-bottom:12px}
.section-search input{
  width:100%;background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);
  padding:10px 14px 10px 38px;color:var(--txt);font-size:.82rem;
  font-family:'Tajawal',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none;
}
.section-search input:focus{border-color:rgba(229,9,20,.4)}
.section-search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.75rem;pointer-events:none}
.tmdb-row{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px;margin-bottom:4px}
.tmdb-row::-webkit-scrollbar{display:none}
.tmdb-row-inner{display:flex;gap:8px}
.tmdb-card{flex-shrink:0;width:110px;cursor:default}
.tmdb-card img{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--s2)}
.tmdb-card .tc-title{font-size:.68rem;font-weight:600;margin-top:4px;color:var(--txt-2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tmdb-card .tc-year{font-size:.6rem;color:var(--dim)}
.cat-list{display:flex;flex-direction:column;gap:4px;padding:0 14px}
.cat-row{
  background:var(--s1);border:1px solid rgba(255,255,255,.03);border-radius:var(--r);
  padding:14px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all .2s;animation:rowIn .3s ease backwards;
}
.cat-row:nth-child(1){animation-delay:.02s}.cat-row:nth-child(2){animation-delay:.04s}
.cat-row:nth-child(3){animation-delay:.06s}.cat-row:nth-child(n+4){animation-delay:.08s}
@keyframes rowIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.cat-row:active{background:rgba(229,9,20,.07);border-color:rgba(229,9,20,.15);transform:translateX(-2px)}
.cr-ico{font-size:1.15rem;flex-shrink:0}
.cr-name{flex:1;font-size:.88rem;font-weight:600;color:var(--txt-2)}
.cr-arr{color:var(--dimmer);font-size:.95rem;flex-shrink:0}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:0 14px}
.ch-card{
  background:var(--s1);border:1px solid rgba(255,255,255,.03);border-radius:var(--r2);
  padding:14px 8px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:all .22s;
}
.ch-card:active{transform:scale(.96);border-color:rgba(229,9,20,.25)}
.ch-logo{width:50px;height:50px;border-radius:10px;object-fit:contain;margin:0 auto 8px;background:var(--s3);padding:2px;display:block}
.ch-name{font-size:.7rem;font-weight:600;line-height:1.3;color:var(--txt-2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.live-tag{position:absolute;top:5px;left:5px;background:var(--accent);color:#fff;font-size:.52rem;font-weight:800;padding:2px 6px;border-radius:3px}
.vod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:7px;padding:0 14px}
.vod-card{cursor:pointer;transition:transform .22s;position:relative}
.vod-card:active{transform:scale(.96)}
.vod-poster{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--s2)}
.vod-score{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:1px 5px;font-size:.58rem;font-weight:700;color:var(--gold)}
.vod-name{font-size:.7rem;font-weight:600;margin-top:5px;line-height:1.3;color:var(--txt-2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;background:transparent;
  border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:7px 13px;
  color:var(--dim);font-size:.8rem;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;margin:12px 14px 4px;
}
.back-btn:active{color:var(--accent);border-color:var(--accent)}
.ldr{display:flex;flex-direction:column;align-items:center;gap:12px;padding:55px 20px}
.ldr-ring{width:36px;height:36px;border:3px solid rgba(229,9,20,.12);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldr-txt{font-size:.8rem;color:var(--dim)}
.mpty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:55px 20px;text-align:center}
.mpty-ico{font-size:2.4rem;opacity:.5}
.mpty-txt{font-size:.82rem;color:var(--dim);line-height:1.7;white-space:pre-line;max-width:260px}

/* ═══ PLAYER ═══ */
.pmoda{display:none;position:fixed;inset:0;background:#000;z-index:2000;flex-direction:column}
.pmoda.on{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ptop{
  display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(var(--st) + 10px);
  background:linear-gradient(180deg,rgba(0,0,0,.95) 0%,transparent 100%);
  position:absolute;top:0;left:0;right:0;z-index:20;
}
.pbk{
  width:38px;height:38px;border-radius:50%;background:rgba(30,30,30,.9);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.pbk:active{background:rgba(229,9,20,.3);border-color:var(--accent);transform:scale(.94)}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:.68rem;color:var(--dim);margin-top:2px}
.pwrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
.bufov{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:15;pointer-events:none;
}
.bufov.on{display:flex}
.buf-ring{width:44px;height:44px;border:3px solid rgba(229,9,20,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.buf-txt{font-size:.78rem;color:rgba(255,255,255,.55)}
.errov{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(0,0,0,.95);z-index:16;text-align:center;padding:24px;
}
.errov.on{display:flex}
.err-ico{font-size:2.6rem}
.err-msg{font-size:.82rem;color:var(--dim);line-height:1.7;max-width:260px}
.retry-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:11px 28px;font-size:.86rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;
}
.retry-btn:active{transform:scale(.96);background:var(--accent-d)}
.toast{
  position:fixed;bottom:calc(var(--sb) + 24px);left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--s2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);
  padding:9px 18px;font-size:.8rem;color:var(--txt);z-index:9000;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.lk-card{padding:30px 22px}.ch-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr))}.vod-grid{grid-template-columns:repeat(3,1fr)}.tmdb-card{width:100px}}
@media(max-width:360px){.ch-grid{grid-template-columns:repeat(3,1fr)}}
@media(orientation:landscape) and (max-height:500px){.ptop{padding-top:calc(env(safe-area-inset-top,0px)+4px)}.hero{height:180px}}
</style>
</head>
<body>

<!-- ═══ INLINE SVG ICON (used everywhere, no external file needed) ═══ -->
<svg id="appIconSVG" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" style="display:none">
  <rect width="180" height="180" rx="38" fill="#141414"/>
  <rect x="4" y="4" width="172" height="172" rx="34" fill="none" stroke="#E50914" stroke-width="3" opacity=".3"/>
  <text x="90" y="100" font-family="Arial,sans-serif" font-weight="900" font-size="44" fill="#E50914" text-anchor="middle">TO</text>
  <text x="90" y="142" font-family="Arial,sans-serif" font-weight="900" font-size="30" fill="#ffffff" text-anchor="middle">TV+</text>
</svg>

<!-- SPLASH -->
<div id="splash">
  <svg class="app-icon-splash" viewBox="0 0 180 180" style="animation:spPulse 2s ease-in-out infinite">
    <use href="#appIconSVG rect"/><use href="#appIconSVG text"/>
    <rect width="180" height="180" rx="38" fill="#141414"/>
    <rect x="4" y="4" width="172" height="172" rx="34" fill="none" stroke="#E50914" stroke-width="3" opacity=".3"/>
    <text x="90" y="100" font-family="Arial,sans-serif" font-weight="900" font-size="44" fill="#E50914" text-anchor="middle">TO</text>
    <text x="90" y="142" font-family="Arial,sans-serif" font-weight="900" font-size="30" fill="#fff" text-anchor="middle">TV+</text>
  </svg>
  <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
  <div class="sp-txt">TOTV+</div>
</div>

<!-- LOCK -->
<div class="screen" id="lockScreen">
  <div class="lk-card">
    <div class="lk-brand">
      <svg width="64" height="64" viewBox="0 0 180 180">
        <rect width="180" height="180" rx="38" fill="#141414"/>
        <rect x="4" y="4" width="172" height="172" rx="34" fill="none" stroke="#E50914" stroke-width="3" opacity=".3"/>
        <text x="90" y="100" font-family="Arial,sans-serif" font-weight="900" font-size="44" fill="#E50914" text-anchor="middle">TO</text>
        <text x="90" y="142" font-family="Arial,sans-serif" font-weight="900" font-size="30" fill="#fff" text-anchor="middle">TV+</text>
      </svg>
      <h1>TOTV+</h1>
      <p>أدخل رمز الدخول</p>
    </div>
    <div id="s1">
      <div class="lk-field">
        <span class="fi">🔐</span>
        <input type="password" id="pinIn" placeholder="رمز الدخول" maxlength="10" inputmode="numeric" autocomplete="off">
      </div>
      <button class="lk-btn" id="pinBtn">دخول</button>
      <div class="lk-err" id="pinErr"></div>
    </div>
    <div class="proto-warn" id="protoWarn">
      ⚠️ الصفحة تعمل عبر HTTPS مما يمنع الاتصال بالسيرفر<br>
      <a id="httpLink" href="#">اضغط هنا للانتقال إلى HTTP</a>
    </div>
  </div>
</div>

<!-- APP -->

/* ═══════════════════════════════════════════════════════
   GENERATE PWA MANIFEST DYNAMICALLY (avoids manifest.json 404)
═══════════════════════════════════════════════════════ */
(function(){
  /* Create a canvas icon for PWA */
  function makeIconDataURL(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;
    const x=c.getContext('2d');
    /* Background */
    x.fillStyle='#141414';
    x.beginPath();x.roundRect(0,0,size,size,size*.21);x.fill();
    /* Border */
    x.strokeStyle='rgba(229,9,20,0.3)';x.lineWidth=size*.02;
    x.beginPath();x.roundRect(size*.02,size*.02,size*.96,size*.96,size*.19);x.stroke();
    /* Text TO */
    x.fillStyle='#E50914';x.font=`900 ${size*.24}px Arial`;x.textAlign='center';
    x.fillText('TO',size/2,size*.56);
    /* Text TV+ */
    x.fillStyle='#ffffff';x.font=`900 ${size*.17}px Arial`;
    x.fillText('TV+',size/2,size*.79);
    return c.toDataURL('image/png');
  }

  const icon192=makeIconDataURL(192);
  const icon512=makeIconDataURL(512);

  const manifest={
    name:'TOTV+ Premium',
    short_name:'TOTV+',
    description:'مشغل قنوات وأفلام احترافي',
    start_url:'./',
    display:'standalone',
    orientation:'any',
    background_color:'#000000',
    theme_color:'#000000',
    icons:[
      {src:icon192,sizes:'192x192',type:'image/png'},
      {src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('link');
  link.rel='manifest';link.href=url;
  /* Remove old manifest link if exists */
  const old=document.querySelector('link[rel="manifest"]');
  if(old)old.remove();
  document.head.appendChild(link);

  /* Also set apple-touch-icon to canvas PNG */
  const appleLink=document.querySelector('link[rel="apple-touch-icon"]');
  if(appleLink)appleLink.href=icon192;
})();

/* ═══════════════════════════════════════════════════════
   PROTOCOL FIXER — Intercepts ALL URLs
   ═══════════════════════════════════════════════════════
   Problem: When the page loads via HTTPS (Safari home screen,
   Google links, etc.), the browser blocks HTTP requests.
   
   Solution:
   1. Auto-redirect HTTPS→HTTP on page load
   2. For fetch(): wrap the native fetch to force http:// 
      for IPTV server URLs
   3. For <video> src: always use http://
═══════════════════════════════════════════════════════ */
const ProtoFix={
  isHTTPS: location.protocol==='https:',
  
  init(){
    if(!this.isHTTPS) return false;
    
    /* Auto-redirect to HTTP */
    const httpUrl=location.href.replace(/^https:/,'http:');
    
    /* Show warning immediately */
    setTimeout(()=>{
      const w=document.getElementById('protoWarn');
      const l=document.getElementById('httpLink');
      if(w)w.style.display='block';
      if(l)l.href=httpUrl;
    },100);
    
    /* Try redirect */
    try{location.replace(httpUrl)}catch(e){}
    return true; /* Signal that we're on HTTPS */
  },

  /* Force any IPTV server URL to http:// */
  fixUrl(url){
    if(typeof url!=='string') return url;
    /* Only fix URLs pointing to our IPTV server */
    if(url.includes('m3um9xplus') || url.includes(CFG.SERVER.replace('http://',''))) {
      return url.replace(/^https:/,'http:');
    }
    return url;
  }
};

  vod(id){return ProtoFix.fixUrl(`${this.base()}/movie/${CFG.USERNAME}/${CFG.PASSWORD}/${id}.mp4`)},
  ep(id,ext){return ProtoFix.fixUrl(`${this.base()}/series/${CFG.USERNAME}/${CFG.PASSWORD}/${id}.${ext||'mp4'}`)},
  async fetch(url,tries=CFG.RETRIES){
    url=ProtoFix.fixUrl(url);
    let last;
    for(let i=0;i<tries;i++){
      try{
        const ctrl=new AbortController();
        const tid=setTimeout(()=>ctrl.abort(),CFG.TIMEOUT);
        const res=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
        clearTimeout(tid);
        if(!res.ok)throw new Error('HTTP '+res.status);
        const txt=await res.text();
        try{return JSON.parse(txt)}catch(_){return txt}
      }catch(e){last=e;if(i<tries-1)await sleep(CFG.RETRY_DELAY)}
    }
    throw last;
  }
};

  _rVodGrid(st,cn,el,type,cid){if(!st?.length){el.innerHTML=U.mpty('🎬','لا توجد محتويات');return}const bk='bk-'+type+cid,gid='vg'+cid;let h=`<button class="back-btn" id="${bk}">‹ رجوع</button><div class="section"><div class="section-hd"><div class="section-title">${U.esc(cn)}</div><div class="section-count">${st.length}</div></div><div class="section-search"><input type="text" placeholder="بحث..." data-grid="${gid}"></div></div><div class="vod-grid" id="${gid}">`;st.forEach(s=>{const img=s.stream_icon||s.cover||s.movie_image||'';const sc=s.rating?parseFloat(s.rating).toFixed(1):'';const sid=s.stream_id||s.series_id;h+=`<div class="vod-card" data-sid="${sid}" data-type="${type}" data-name="${U.esc(s.name).toLowerCase()}">${sc?`<div class="vod-score">⭐${sc}</div>`:''}<img src="${U.esc(img)}" class="vod-poster" onerror="this.src=''" loading="lazy"><div class="vod-name">${U.esc(s.name)}</div></div>`});h+='</div>';el.innerHTML=h;$(bk).onclick=()=>type==='movie'?this.loadMovCats():this.loadSerCats();el.querySelector(`[data-grid="${gid}"]`).oninput=e=>flt(e.target.value,gid);el.querySelectorAll('.vod-card').forEach(c=>c.addEventListener('click',()=>{const nm=c.querySelector('.vod-name').textContent;if(c.dataset.type==='movie')Player.playVod(c.dataset.sid,nm);else this.loadSerInfo(c.dataset.sid,nm)}))},

  _rSerInfo(data,sn,el){const info=data.info||{},eps=data.episodes||{};const cover=info.cover||info.movie_image||'';let h=`<button class="back-btn" id="bk-ser-i">‹ رجوع</button><div style="display:flex;gap:12px;margin:0 14px 16px;flex-wrap:wrap;align-items:flex-start">${cover?`<img src="${U.esc(cover)}" style="width:80px;border-radius:10px;object-fit:cover;flex-shrink:0" loading="lazy" onerror="this.remove()">`:''}<div style="flex:1;min-width:0"><div style="font-size:1.05rem;font-weight:700;margin-bottom:4px">${U.esc(sn)}</div><div style="font-size:.75rem;color:var(--dim);line-height:1.7">${U.esc((info.plot||'').slice(0,200))}</div></div></div>`;const seasons=Object.keys(eps);if(!seasons.length){el.innerHTML=h+U.mpty('📺','لا توجد حلقات');return}seasons.forEach(s=>{h+=`<div style="padding:0 14px;margin-bottom:18px"><div style="font-size:.88rem;font-weight:700;color:var(--accent);padding:7px 0;margin-bottom:8px;border-bottom:1px solid rgba(229,9,20,.12)">الموسم ${s}</div><div class="ch-grid" style="padding:0">`;(eps[s]||[]).forEach(ep=>{const th=ep.info?.movie_image||'';const ext=ep.container_extension||'mp4';h+=`<div class="ch-card ep-card" data-eid="${ep.id}" data-ext="${U.esc(ext)}" data-epn="${ep.episode_num}" data-sname="${U.esc(sn)}">${th?`<img src="${U.esc(th)}" class="ch-logo" style="height:40px;object-fit:cover;border-radius:8px" loading="lazy" onerror="this.remove()">`:`<div style="font-size:1.2rem;margin-bottom:5px">▶️</div>`}<div class="ch-name">حلقة ${ep.episode_num}</div></div>`});h+='</div></div>'});el.innerHTML=h;$('bk-ser-i').onclick=()=>this.loadSerCats();el.querySelectorAll('.ep-card').forEach(c=>c.addEventListener('click',()=>Player.playEp(c.dataset.eid,`${c.dataset.sname} — حلقة ${c.dataset.epn}`,c.dataset.ext)))}
};
const $=id=>document.getElementById(id);
const flt=(q,gid)=>{const g=$(gid);if(!g)return;const ql=q.toLowerCase();g.querySelectorAll('[data-name]').forEach(c=>{c.style.display=c.dataset.name.includes(ql)?'':'none'})};
const catRow=(id,ico,name)=>`<div class="cat-row" data-id="${U.esc(id)}"><div class="cr-ico">${ico}</div><div class="cr-name">${U.esc(name)}</div><div class="cr-arr">‹</div></div>`;

/* ═══════════════════════════════════════════════════════
   PLAYER — Fixed for Desktop + iOS
   ═══════════════════════════════════════════════════════
   Desktop (Chrome/FF/Edge): 
     - Live: HLS.js 
     - VOD (mp4): native <video> with direct src
   iOS/Safari:
     - Everything: native <video> (handles HLS natively)
═══════════════════════════════════════════════════════ */
const Player={
  _hls:null,
  playLive(id,name){U.vibe(12);this.open(API.live(id)+'.m3u8',name,'📡 بث مباشر','live',id)},
  playVod(id,name){U.vibe(12);this.open(API.vod(id),name,'🎬 فيلم','vod',null)},
  playEp(id,name,ext){U.vibe(12);this.open(API.ep(id,ext),name,'📺 مسلسل','vod',null)},

  open(url,title,sub,type,streamId){
    url=ProtoFix.fixUrl(url);
    S.curUrl=url;S.curTitle=title;
    $('ptitle').textContent=title;$('psub').textContent=sub;
    $('pm').classList.add('on');document.body.style.overflow='hidden';
    history.pushState({player:true},'');
    this._build(url,type,streamId);
  },

  _build(url,type,streamId){
    this._destroyAll();
    const wrap=$('pwrap');
    const vid=document.createElement('video');
    vid.id='vplayer';
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');
    vid.setAttribute('x-webkit-airplay','allow');
    vid.controls=true;vid.preload='auto';vid.autoplay=true;
    vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;background:#000;object-fit:contain;';

    /* For desktop: add crossorigin to avoid CORS issues with some servers */
    if(Device.isDesktop){
      vid.crossOrigin='anonymous';
    }

    const bufEl=this._makeBuf();
    const errEl=this._makeErr(url,type,streamId);
    wrap.appendChild(vid);wrap.appendChild(bufEl);wrap.appendChild(errEl);
    this._showBuf(true);

    const isLive=type==='live'||/\.m3u8/i.test(url);

    if(Device.useNativePlayer()){
      /* iOS / Safari — native handles everything */
      this._playNative(vid,url,type,streamId);
    } else if(isLive && typeof Hls!=='undefined' && Hls.isSupported()){
      /* Desktop + Live stream → HLS.js */
      this._playHLS(vid,url,streamId);
    } else {
      /* Desktop + VOD (mp4/mkv) → native video 
         IMPORTANT: For desktop mp4, we set src directly.
         If crossOrigin causes issues, remove it */
      vid.removeAttribute('crossorigin');
      this._playNative(vid,url,type,streamId);
    }
  },

  _playNative(vid,url,type,streamId){
    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
    vid.addEventListener('loadeddata',()=>this._showBuf(false));
    vid.addEventListener('error',()=>{
      /* If m3u8 failed on native, try .ts fallback */
      if(url.endsWith('.m3u8')&&streamId){
        const ts=ProtoFix.fixUrl(API.live(streamId)+'.ts');
        console.warn('[Player] m3u8 failed, trying .ts:',ts);
        vid.src=ts;vid.load();vid.play().catch(()=>{});
      } else if(vid.getAttribute('crossorigin')){
        /* If CORS error, retry without crossorigin */
        console.warn('[Player] Retrying without crossOrigin');
        vid.removeAttribute('crossorigin');
        vid.src=url;vid.load();vid.play().catch(()=>{});
      } else {
        this._showBuf(false);
        this._showErr(true,'تعذّر تشغيل المحتوى. تأكد من صلاحية الاشتراك');
      }
    });
    vid.src=url;vid.load();
    vid.play().catch(e=>{
      console.warn('[Player] autoplay blocked:',e.message);
      this._showBuf(false);
    });
  },

  _playHLS(vid,url,streamId){
    this._hls=new Hls({
      enableWorker:true,lowLatencyMode:true,
      backBufferLength:30,maxBufferLength:60,maxMaxBufferLength:120,
      fragLoadingTimeOut:20000,manifestLoadingTimeOut:15000,levelLoadingTimeOut:15000,
      xhrSetup:(xhr)=>{/* No custom headers to avoid CORS preflight */}
    });
    this._hls.loadSource(url);
    this._hls.attachMedia(vid);
    this._hls.on(Hls.Events.MANIFEST_PARSED,()=>{this._showBuf(false);vid.play().catch(()=>{})});
    this._hls.on(Hls.Events.ERROR,(_,d)=>{
      if(!d.fatal)return;
      if(d.type===Hls.ErrorTypes.NETWORK_ERROR&&url.endsWith('.m3u8')&&streamId){
        const ts=ProtoFix.fixUrl(API.live(streamId)+'.ts');
        this._hls.destroy();this._hls=null;
        this._hls=new Hls({enableWorker:true,lowLatencyMode:true});
        this._hls.loadSource(ts);this._hls.attachMedia(vid);
      }else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
        this._hls.recoverMediaError();
      }else{
        this._showBuf(false);this._showErr(true,'تعذّر تشغيل البث: '+d.details);
      }
    });
    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
  },

  _makeBuf(){const d=document.createElement('div');d.className='bufov on';d.id='bufov';d.innerHTML='<div class="buf-ring"></div><div class="buf-txt">جاري التحميل...</div>';return d},
  _makeErr(url,type,sid){const d=document.createElement('div');d.className='errov';d.id='errov';d.innerHTML=`<div class="err-ico">⚠️</div><div class="err-msg" id="ermsg">تعذّر تشغيل البث.</div><button class="retry-btn" id="retryBtn">إعادة المحاولة</button>`;setTimeout(()=>{const rb=$('retryBtn');if(rb)rb.onclick=()=>{U.vibe(10);this._build(url,type,sid)}},0);return d},
  _showBuf(s){const el=$('bufov');if(el)el.classList.toggle('on',s)},
  _showErr(s,msg=''){const el=$('errov');if(el)el.classList.toggle('on',s);if(s&&msg){const m=$('ermsg');if(m)m.textContent=msg}},
  _destroyAll(){if(this._hls){try{this._hls.destroy()}catch(_){}this._hls=null}const wrap=$('pwrap');while(wrap.firstChild)wrap.removeChild(wrap.firstChild)},
  close(){U.vibe(8);this._destroyAll();$('pm').classList.remove('on');document.body.style.overflow=''}
};

/* ═══════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════ */
function setupEvents(){
  $('pinBtn').onclick=()=>Auth.checkPin();
  $('pinIn').onkeydown=e=>{if(e.key==='Enter')Auth.checkPin()};
  $('logoutBtn').onclick=()=>Auth.logout();
  $('closePBtn').onclick=()=>Player.close();
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>App.switchTab(t.dataset.t)));
  window.addEventListener('popstate',()=>{if($('pm').classList.contains('on'))Player.close()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')Player.close()});
  let _ty=0;
  document.addEventListener('touchstart',e=>{_ty=e.touches[0].pageY},{passive:true});
  document.addEventListener('touchmove',e=>{const ab=document.querySelector('.abody');if(ab&&ab.scrollTop===0&&e.touches[0].pageY>_ty)e.preventDefault()},{passive:false});
  document.addEventListener('contextmenu',e=>{if(e.target.matches('video,.ch-card,.vod-card'))e.preventDefault()});
}

/* ═══════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════ */
window.addEventListener('load',async()=>{
  /* Fix HTTPS → HTTP */
  const redirected=ProtoFix.init();

  if(ProtoFix.isHTTPS){
    /* We're on HTTPS. Redirect was attempted.
       Show lock screen with warning in case redirect didn't work */
    setTimeout(()=>{
      $('splash').classList.add('hide');
      $('lockScreen').classList.add('on');
      $('protoWarn').style.display='block';
      $('httpLink').href=location.href.replace(/^https:/,'http:');
    },1200);
    /* Still set up events so user can try PIN if somehow it works */
    setupEvents();
    return;
  }

  setupEvents();
  const loggedIn=await Auth.autoLogin();
  setTimeout(()=>{
    $('splash').classList.add('hide');
    if(loggedIn)App.boot();
    else{$('lockScreen').classList.add('on');$('pinIn').focus()}
  },1500);
});
</script>
