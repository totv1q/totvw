<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <script>
    if (location.protocol === 'https:' && !location.hostname.includes('localhost')) {
        location.replace(location.href.replace('https:', 'http:'));
    }
    // تعريف الدالة $ لضمان عدم توقف الكود الأصلي
    const $ = id => document.getElementById(id);
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TOTV+">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Icon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
        // جلب البيانات من ذاكرة المتصفح
        const savedUser = localStorage.getItem('totv_user');
        const savedPass = localStorage.getItem('totv_pass');
        
        if (savedUser && savedPass) {
            // البحث عن حقول الإدخال وتعبئتها تلقائياً
            // ملاحظة: تأكد أن الـ IDs في الـ HTML لديك هي uIn و pIn
            const uField = document.getElementById('uIn');
            const pField = document.getElementById('pIn');
            
            if (uField && pField) {
                uField.value = savedUser;
                pField.value = savedPass;
                console.log("تمت تعبئة بيانات الدخول المحفوظة بنجاح.");
            }
        }
    });

    // دالة لاستدعائها داخل منطق تسجيل الدخول الخاص بك عند النجاح
    function saveMyLogin(u, p) {
        localStorage.setItem('totv_user', u);
        localStorage.setItem('totv_pass', p);
    }
  </script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --accent:#E50914;--accent-d:#B20710;--accent-l:#FF1926;
  --gold:#C6A84A;--gold-l:#E8D48B;
  --bg:#141414;--s1:#181818;--s2:#222;--s3:#2a2a2a;--s4:#333;
  --glass:rgba(255,255,255,.06);--gb:rgba(255,255,255,.1);
  --txt:#fff;--txt-2:#e5e5e5;--dim:#8c8c8c;--dimmer:#555;
  --r:8px;--r2:12px;--r3:20px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --nav-h:56px;--tab-h:46px;
}
/* ... باقي الـ CSS الخاص بك ... */
/* ═══ SPLASH ═══ */
#splash{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
  transition:opacity .6s ease,visibility .6s;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{width:120px;animation:spPulse 2s ease-in-out infinite}
@keyframes spPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
.sp-bar-wrap{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.sp-bar{width:0;height:100%;background:var(--accent);border-radius:3px;animation:spLoad 1.4s ease forwards}
@keyframes spLoad{to{width:100%}}

/* ═══ LOCK ═══ */
.screen{display:none;min-height:100svh;align-items:center;justify-content:center;padding:20px;position:fixed;inset:0;z-index:100}
.screen.on{display:flex}

#lockScreen{
  background:#000;
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(229,9,20,.12) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 100%,rgba(229,9,20,.06) 0%,transparent 40%);
  padding-top:var(--st);padding-bottom:var(--sb);
}
.lk-card{
  background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r3);padding:48px 36px;width:100%;max-width:420px;
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  animation:cardUp .5s cubic-bezier(.16,1,.3,1);
}
@keyframes cardUp{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}

.lk-brand{
  text-align:center;margin-bottom:32px;
}
.lk-brand img{width:64px;height:64px;border-radius:14px;margin-bottom:14px}
.lk-brand h1{font-size:1.8rem;font-weight:900;letter-spacing:3px;color:#fff}
.lk-brand p{font-size:.85rem;color:var(--dim);margin-top:6px}

.lk-field{position:relative;margin-bottom:16px}
.lk-field input{
  width:100%;background:var(--s3);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);padding:16px 18px 16px 46px;
  color:var(--txt);font-size:1rem;font-family:'Tajawal',sans-serif;
  outline:none;transition:all .2s;-webkit-appearance:none;
}
.lk-field input:focus{border-color:var(--accent);background:rgba(42,42,42,.95)}
.lk-field input::placeholder{color:var(--dimmer)}
.lk-field .fi{position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;opacity:.5}

.lk-btn{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:15px;font-size:1.05rem;font-weight:700;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:all .2s;margin-top:8px;
}
.lk-btn:active{background:var(--accent-d);transform:scale(.98)}
.lk-btn:disabled{opacity:.5;cursor:wait}

.lk-err{
  background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.3);
  border-radius:var(--r);padding:12px 16px;font-size:.85rem;color:var(--accent-l);
  text-align:center;margin-top:14px;display:none;animation:shake .4s;
}
.lk-err.on{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* ═══ APP SHELL ═══ */
#app{display:none;flex-direction:column;height:100vh;height:100svh;position:fixed;inset:0;background:var(--bg)}
#app.on{display:flex}

/* Nav */
.anav{
  height:var(--nav-h);
  background:linear-gradient(180deg,rgba(20,20,20,.98) 0%,rgba(20,20,20,.92) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:0 16px;padding-top:var(--st);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.05);
  z-index:50;
}
.anav-logo{width:30px;height:30px;border-radius:7px;object-fit:cover}
.anav-title{font-size:1.2rem;font-weight:900;letter-spacing:2px;color:var(--accent)}
.anav-sp{flex:1}
.anav-user{font-size:.75rem;color:var(--dim);display:flex;align-items:center;gap:6px}
.anav-user .dot{width:6px;height:6px;border-radius:50%;background:#46d369;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.out-btn{
  background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:var(--r);
  color:var(--dim);font-size:.75rem;padding:6px 14px;cursor:pointer;font-family:'Tajawal',sans-serif;
  transition:all .2s;
}
.out-btn:active{color:var(--accent);border-color:var(--accent)}

/* Tabs — Netflix style */
.tabs{
  display:flex;gap:0;padding:0;background:rgba(20,20,20,.95);flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.tab{
  flex:1;background:transparent;border:none;border-bottom:2px solid transparent;
  padding:12px 8px;color:var(--dim);font-size:.82rem;font-weight:600;
  font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.on{color:#fff;border-bottom-color:var(--accent)}
.tab:active{opacity:.7}

/* Body */
.abody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.view{display:none;padding-bottom:80px}
.view.on{display:block}

/* ═══ HERO BANNER — TMDB Trending ═══ */
.hero{position:relative;width:100%;height:280px;overflow:hidden;margin-bottom:2px}
@media(min-width:600px){.hero{height:380px}}
.hero-slide{
  position:absolute;inset:0;opacity:0;transition:opacity .8s ease;
  background-size:cover;background-position:center top;
}
.hero-slide.active{opacity:1}
.hero-fade{
  position:absolute;inset:0;
  background:linear-gradient(0deg,var(--bg) 0%,rgba(20,20,20,.4) 40%,rgba(20,20,20,.1) 70%,rgba(20,20,20,.6) 100%);
  pointer-events:none;
}
.hero-content{
  position:absolute;bottom:28px;right:20px;left:20px;z-index:2;
}
.hero-title{font-size:1.5rem;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.8);line-height:1.3;margin-bottom:6px}
.hero-meta{font-size:.78rem;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hero-badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:3px}
.hero-dots{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:3;
}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
.hero-dot.on{background:#fff;width:18px;border-radius:3px}

/* ═══ CONTENT SECTIONS ═══ */
.section{padding:14px 14px 0}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:1.05rem;font-weight:700}
.section-count{font-size:.72rem;color:var(--dim);background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:2px 10px}
.section-search{width:100%;position:relative;margin-bottom:14px}
.section-search input{
  width:100%;background:var(--s2);border:1px solid var(--gb);border-radius:var(--r);
  padding:11px 14px 11px 40px;color:var(--txt);font-size:.85rem;
  font-family:'Tajawal',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none;
}
.section-search input:focus{border-color:rgba(229,9,20,.5)}
.section-search::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}

/* Category rows — Netflix style */
.cat-list{display:flex;flex-direction:column;gap:5px}
.cat-row{
  background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:var(--r);
  padding:15px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .2s;animation:rowIn .35s ease backwards;
}
.cat-row:nth-child(1){animation-delay:.02s}.cat-row:nth-child(2){animation-delay:.04s}
.cat-row:nth-child(3){animation-delay:.06s}.cat-row:nth-child(4){animation-delay:.08s}
.cat-row:nth-child(n+5){animation-delay:.1s}
@keyframes rowIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.cat-row:active{background:rgba(229,9,20,.08);border-color:rgba(229,9,20,.2);transform:translateX(-3px)}
.cr-ico{font-size:1.2rem;flex-shrink:0}
.cr-name{flex:1;font-size:.92rem;font-weight:600;color:var(--txt-2)}
.cr-cnt{font-size:.72rem;color:var(--dim)}
.cr-arr{color:var(--dimmer);font-size:1rem;flex-shrink:0}

/* Channel grid */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ch-card{
  background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:var(--r2);
  padding:16px 10px;text-align:center;cursor:pointer;position:relative;overflow:hidden;
  transition:all .25s;
}
.ch-card:active{transform:scale(.96);border-color:rgba(229,9,20,.3);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ch-card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.ch-logo{width:54px;height:54px;border-radius:10px;object-fit:contain;margin:0 auto 10px;background:var(--s3);padding:3px;display:block}
.ch-name{font-size:.73rem;font-weight:600;line-height:1.35;color:var(--txt-2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.live-tag{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:.55rem;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.3px}

/* VOD grid — Netflix poster style */
.vod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px}
.vod-card{cursor:pointer;transition:transform .25s;position:relative}
.vod-card:active{transform:scale(.96)}
.vod-poster{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--s2);transition:all .25s}
.vod-card:active .vod-poster{box-shadow:0 12px 30px rgba(0,0,0,.7)}
.vod-score{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 6px;font-size:.62rem;font-weight:700;color:var(--gold)}
.vod-name{font-size:.72rem;font-weight:600;margin-top:7px;line-height:1.3;color:var(--txt-2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* TMDB horizontal scroll row */
.tmdb-row{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:0 14px;margin-bottom:4px}
.tmdb-row::-webkit-scrollbar{display:none}
.tmdb-row-inner{display:flex;gap:8px}
.tmdb-card{flex-shrink:0;width:120px;cursor:default;transition:transform .2s}
.tmdb-card img{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;display:block;background:var(--s2)}
.tmdb-card .tc-title{font-size:.7rem;font-weight:600;margin-top:5px;color:var(--txt-2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tmdb-card .tc-year{font-size:.62rem;color:var(--dim)}

.back-btn{
  display:inline-flex;align-items:center;gap:6px;background:transparent;
  border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:8px 14px;
  color:var(--dim);font-size:.82rem;cursor:pointer;font-family:'Tajawal',sans-serif;
  transition:all .2s;margin:14px 14px 6px;
}
.back-btn:active{color:var(--accent);border-color:var(--accent)}

.ldr{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px}
.ldr-ring{width:38px;height:38px;border:3px solid rgba(229,9,20,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldr-txt{font-size:.82rem;color:var(--dim)}

.mpty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 20px;text-align:center}
.mpty-ico{font-size:2.6rem;opacity:.5}
.mpty-txt{font-size:.86rem;color:var(--dim);line-height:1.7;white-space:pre-line;max-width:280px}

/* ═══ PLAYER MODAL ═══ */
.pmoda{display:none;position:fixed;inset:0;background:#000;z-index:2000;flex-direction:column}
.pmoda.on{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.ptop{
  display:flex;align-items:center;gap:11px;
  padding:12px 16px;padding-top:calc(var(--st) + 12px);
  background:linear-gradient(180deg,rgba(0,0,0,.95) 0%,transparent 100%);
  position:absolute;top:0;left:0;right:0;z-index:20;
}
.pbk{
  width:40px;height:40px;border-radius:50%;
  background:rgba(30,30,30,.9);border:1px solid rgba(255,255,255,.12);
  color:#fff;font-size:1.3rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;
}
.pbk:active{background:rgba(229,9,20,.3);border-color:var(--accent);transform:scale(.94)}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:.7rem;color:var(--dim);margin-top:2px}

.pwrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}

/* Buffer */
.bufov{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:15;pointer-events:none;
}
.bufov.on{display:flex}
.buf-ring{width:48px;height:48px;border:3px solid rgba(229,9,20,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.buf-txt{font-size:.8rem;color:rgba(255,255,255,.6)}

/* Error */
.errov{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.95);z-index:16;text-align:center;padding:24px;
}
.errov.on{display:flex}
.err-ico{font-size:2.8rem}
.err-msg{font-size:.86rem;color:var(--dim);line-height:1.7;max-width:280px}
.retry-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:12px 32px;font-size:.9rem;font-weight:700;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:all .2s;
}
.retry-btn:active{transform:scale(.96);background:var(--accent-d)}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--sb) + 26px);left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--s2);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);
  padding:10px 20px;font-size:.82rem;color:var(--txt);z-index:9000;opacity:0;
  transition:all .25s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:480px){
  .lk-card{padding:32px 22px}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .vod-grid{grid-template-columns:repeat(3,1fr)}
  .tmdb-card{width:105px}
}
@media(max-width:360px){
  .ch-grid{grid-template-columns:repeat(3,1fr)}
  .vod-grid{grid-template-columns:repeat(3,1fr)}
}
@media(orientation:landscape) and (max-height:500px){
  .ptop{padding-top:calc(env(safe-area-inset-top,0px) + 4px);padding-bottom:4px}
  .hero{height:200px}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="sp-logo" src="Icon-180.png" alt="TOTV+">
  <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
</div>

<!-- LOCK SCREEN — direct PIN only -->
<div class="screen" id="lockScreen">
  <div class="lk-card">
    <div class="lk-brand">
      <img src="Icon-180.png" alt="TOTV+">
      <h1>TOTV+</h1>
      <p>أدخل رمز الدخول</p>
    </div>

    <!-- PIN step -->
    <div id="s1">
      <div class="lk-field">
        <span class="fi">🔐</span>
        <input type="password" id="pinIn" placeholder="رمز الدخول" maxlength="10" inputmode="numeric" autocomplete="off">
      </div>
      <button class="lk-btn" id="pinBtn">دخول</button>
      <div class="lk-err" id="pinErr">رمز الدخول غير صحيح</div>
    </div>

    <!-- Credentials step -->
    <div id="s2" style="display:none">
      <div class="lk-field">
        <span class="fi">👤</span>
        <input type="text" id="uIn" placeholder="اسم المستخدم" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="lk-field">
        <span class="fi">🔑</span>
        <input type="password" id="pIn" placeholder="كلمة المرور">
      </div>
      <button class="lk-btn" id="lBtn">تسجيل الدخول</button>
      <div class="lk-err" id="lErr">بيانات الاشتراك غير صحيحة</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="anav">
    <img class="anav-logo" src="Icon-32.png" alt="">
    <div class="anav-title">TOTV+</div>
    <div class="anav-sp"></div>
    <div class="anav-user">
      <div class="dot"></div>
      <span id="navU"></span>
    </div>
    <button class="out-btn" id="logoutBtn">خروج</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-t="live">📡 قنوات</button>
    <button class="tab" data-t="movies">🎬 أفلام</button>
    <button class="tab" data-t="series">📺 مسلسلات</button>
  </div>

  <div class="abody">
    <div class="view on" id="v-live"><div id="c-live"></div></div>
    <div class="view" id="v-movies"><div id="c-movies"></div></div>
    <div class="view" id="v-series"><div id="c-series"></div></div>
  </div>
</div>

<!-- PLAYER -->

  <div class="ptop">

const CFG = {

/* ═══════════════════════════════════════════
   PROTOCOL FIX — force HTTP for IPTV server
   When added to home screen from Safari, the page
   may load as HTTPS, breaking requests to the HTTP
   IPTV server. We ensure the base URL always uses http://
═══════════════════════════════════════════ */
const API = {
  base() {
    /* Always return http:// regardless of current page protocol */
    const url = CFG.SRV_A + '.' + CFG.SRV_B;
    return url.replace(/^https:\/\//, 'http://');
  },
  url(a, x='') { return `${this.base()}/player_api.php?username=${S.user}&password=${S.pass}&action=${a}${x}`; },
  live(id)   { return `${this.base()}/live/${S.user}/${S.pass}/${id}`; },
  vod(id)    { return `${this.base()}/movie/${S.user}/${S.pass}/${id}.mp4`; },
  ep(id,ext) { return `${this.base()}/series/${S.user}/${S.pass}/${id}.${ext||'mp4'}`; },

  async fetch(url, tries=CFG.RETRIES) {
    let last;
    for (let i=0; i<tries; i++) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(()=>ctrl.abort(), CFG.TIMEOUT);
        const res = await fetch(url, { signal:ctrl.signal, cache:'no-store' });
        clearTimeout(tid);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const txt = await res.text();
        try { return JSON.parse(txt); } catch(_) { return txt; }
      } catch(e) {
        last = e;
        if (i<tries-1) await sleep(CFG.RETRY_DELAY);
      }
    }
    throw last;
  }
};

const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ═══════════════════════════════════════════
   DEVICE DETECTION
═══════════════════════════════════════════ */
const Device = {
  isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream,
  isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent),
  isMac: /Macintosh/.test(navigator.userAgent),
  useNativePlayer() {
    /* iOS always uses native <video> to avoid protocol issues.
       Desktop browsers use HLS.js for better control. */
    return this.isIOS || this.isSafari;
  }
};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const U = {
  esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; },
  toast(msg, ms=2800) {
    const el=$('toast'); el.textContent=msg; el.classList.add('on');
    clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),ms);
  },
  ldr(msg='جاري التحميل...') { return `<div class="ldr"><div class="ldr-ring"></div><div class="ldr-txt">${msg}</div></div>`; },
  mpty(ico,msg) { return `<div class="mpty"><div class="mpty-ico">${ico}</div><div class="mpty-txt">${msg}</div></div>`; },
  vibe(p=10) { try{navigator.vibrate?.(p)}catch(_){} }
};

/* ═══════════════════════════════════════════
   SESSION
═══════════════════════════════════════════ */
const Sess = {
  K:'_tv3',
  save(u,p) { try{sessionStorage.setItem(this.K,btoa(u+'|'+p))}catch(_){} },
  load() {
    try { const v=sessionStorage.getItem(this.K); if(!v)return null;
      const[u,...pp]=atob(v).split('|'); return{u,p:pp.join('|')};
    } catch(_){return null}
  },
  clear() { try{sessionStorage.removeItem(this.K)}catch(_){} }
};

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
const Auth = {
  async checkPin() {
    const val = $('pinIn').value.trim();
    if (val !== CFG.PIN) {
      U.vibe([10,50,10,50,10]); showErr('pinErr');
      $('pinIn').value=''; $('pinIn').focus(); return;
    }
    U.vibe(15);
    $('s1').style.display='none';
    $('s2').style.display='block';

    const sv=Sess.load();
    if (sv) { S.user=sv.u; S.pass=sv.p; await this._verify(); }
    else setTimeout(()=>$('uIn').focus(),80);
  },
  async login() {
  const u = $('uIn').value, p = $('pIn').value;
  if(!u || !p) return App.showToast('أدخل البيانات');
  
  App.showLoading(true);
  // استخدام البروكسي بـ HTTPS لتخطي حماية iOS الحديثة
  const target = `http://silka.m3um9xplus.org:2052/player_api.php?username=${u}&password=${p}&action=get_live_categories`;
  const proxy = "https://api.allorigins.win/raw?url=";

  try {
    const res = await fetch(proxy + encodeURIComponent(target));
    const data = await res.json();
    
    // حفظ البيانات في الذاكرة لكي لا يطلبها التطبيق مرة أخرى
    localStorage.setItem('totv_u', u);
    localStorage.setItem('totv_p', p);
    
    Auth.u = u; Auth.p = p;
    Auth.save();
    await App.initData();
    $('auth').classList.remove('on');
  } catch(e) {
    App.showToast('فشل الدخول: تأكد من الكود أو المتصفح');
  } finally {
    App.showLoading(false);
  }
}
  async _verify() {
    try {
      const d=await API.fetch(API.url('get_live_categories'));
      if(Array.isArray(d)){App.boot();return;} throw 0;
    } catch(_) { Sess.clear(); setTimeout(()=>$('uIn').focus(),80); }
  },
  logout() {
    U.vibe(12); Sess.clear(); S.user=''; S.pass='';
    S.cache={lc:null,ls:{},mc:null,ms:{},sc:null,ss:{}};
    if($('pm').classList.contains('on'))Player.close();

    $('uIn').value=''; $('pIn').value='';

};

function showErr(id,ms=3000){const el=$(id);el.classList.add('on');setTimeout(()=>el.classList.remove('on'),ms)}

/* ═══════════════════════════════════════════
   TMDB — Trending posters for hero banner
═══════════════════════════════════════════ */
const TMDB = {
  async fetchTrending() {
    try {
      const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${CFG.TMDB_KEY}&language=ar`);
      const data = await res.json();
      S.tmdb.trending = (data.results||[]).slice(0,8);
      return S.tmdb.trending;
    } catch(e) { console.warn('[TMDB]',e); return []; }
  },
  async fetchPopularMovies() {
    try {
      const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${CFG.TMDB_KEY}&language=ar&page=1`);
      const data = await res.json();
      S.tmdb.movies = (data.results||[]).slice(0,15);
      return S.tmdb.movies;
    } catch(e) { return []; }
  },
  backdrop(path,size='w1280') { return path ? CFG.TMDB_IMG+size+path : ''; },
  poster(path,size='w342') { return path ? CFG.TMDB_IMG+size+path : ''; }
};

/* ═══════════════════════════════════════════
   HERO BANNER
═══════════════════════════════════════════ */
const Hero = {
  _idx:0, _timer:null,
  async render(container) {
    const items = S.tmdb.trending || await TMDB.fetchTrending();
    if(!items?.length) return '';

    let slides='', dots='';
    items.forEach((m,i)=>{
      const bg = TMDB.backdrop(m.backdrop_path);
      slides += `<div class="hero-slide${i===0?' active':''}" style="background-image:url('${bg}')">
        <div class="hero-fade"></div>
        <div class="hero-content">
          <div class="hero-title">${U.esc(m.title||m.name)}</div>
          <div class="hero-meta">
            <span class="hero-badge">TMDB</span>
            <span>⭐ ${(m.vote_average||0).toFixed(1)}</span>
            <span>${(m.release_date||'').slice(0,4)}</span>
          </div>
        </div>
      </div>`;
      dots += `<div class="hero-dot${i===0?' on':''}"></div>`;
    });

    return `<div class="hero" id="heroSlider">${slides}<div class="hero-dots">${dots}</div></div>`;
  },
  start() {
    this.stop();
    this._timer = setInterval(()=>this.next(), 5000);
  },
  stop() { if(this._timer){clearInterval(this._timer);this._timer=null} },
  next() {
    const slides = document.querySelectorAll('#heroSlider .hero-slide');
    const dots = document.querySelectorAll('#heroSlider .hero-dot');
    if(!slides.length)return;
    slides[this._idx]?.classList.remove('active');
    dots[this._idx]?.classList.remove('on');
    this._idx = (this._idx+1) % slides.length;
    slides[this._idx]?.classList.add('active');
    dots[this._idx]?.classList.add('on');
  }
};

/* ═══════════════════════════════════════════
   TMDB POSTER ROW
═══════════════════════════════════════════ */
async function renderTMDBRow() {
  const movies = S.tmdb.movies || await TMDB.fetchPopularMovies();
  if(!movies?.length) return '';
  let cards = '';
  movies.forEach(m=>{
    const poster = TMDB.poster(m.poster_path,'w342');
    cards += `<div class="tmdb-card">
      <img src="${poster}" alt="${U.esc(m.title)}" loading="lazy" onerror="this.src=''">
      <div class="tc-title">${U.esc(m.title||m.name)}</div>
      <div class="tc-year">${(m.release_date||'').slice(0,4)} · ⭐${(m.vote_average||0).toFixed(1)}</div>
    </div>`;
  });
  return `<div class="section"><div class="section-hd"><div class="section-title">🔥 الأكثر رواجاً</div></div></div>
    <div class="tmdb-row"><div class="tmdb-row-inner">${cards}</div></div>`;
}

      </div>`;
    const seasons=Object.keys(eps);
    if(!seasons.length){el.innerHTML=h+U.mpty('📺','لا توجد حلقات');return;}
    seasons.forEach(sn=>{
      h+=`<div style="padding:0 14px;margin-bottom:20px">
        <div style="font-size:.92rem;font-weight:700;color:var(--accent);padding:8px 0;margin-bottom:10px;border-bottom:1px solid rgba(229,9,20,.15)">
          الموسم ${sn}</div><div class="ch-grid">`;
      (eps[sn]||[]).forEach(ep=>{
        const thumb=ep.info?.movie_image||'';
        const ext=ep.container_extension||'mp4';
        h+=`<div class="ch-card ep-card" data-eid="${ep.id}" data-ext="${U.esc(ext)}" data-epn="${ep.episode_num}" data-sname="${U.esc(sname)}">
          ${thumb?`<img src="${U.esc(thumb)}" class="ch-logo" style="height:44px;object-fit:cover;border-radius:8px" loading="lazy" onerror="this.remove()">`
                 :`<div style="font-size:1.3rem;margin-bottom:6px">▶️</div>`}
          <div class="ch-name">حلقة ${ep.episode_num}</div>
        </div>`;
      });
      h+='</div></div>';
    });
    el.innerHTML=h;
    $('bk-ser-i').onclick=()=>this.loadSerCats();
    el.querySelectorAll('.ep-card').forEach(c=>c.addEventListener('click',()=>
      Player.playEp(c.dataset.eid,`${c.dataset.sname} — حلقة ${c.dataset.epn}`,c.dataset.ext)));
  }
};

/* ═══════════════════════════════════════════
   PLAYER — Smart native/HLS strategy
   iOS/Safari → native <video> (handles HLS natively)
   Chrome/FF  → HLS.js for HLS streams, native for mp4
═══════════════════════════════════════════ */
const Player = {
  _hls:null,

  playLive(id,name) {
    U.vibe(12);
    this.open(API.live(id)+'.m3u8', name, '📡 بث مباشر', 'live', id);
  },
  playVod(id,name) {
    U.vibe(12);
    this.open(API.vod(id), name, '🎬 فيلم', 'vod', null);
  },
  playEp(id,name,ext) {
    U.vibe(12);
    this.open(API.ep(id,ext), name, '📺 مسلسل', 'vod', null);
  },

  open(url,title,sub,type,streamId) {
    S.curUrl=url; S.curTitle=title;
    $('ptitle').textContent=title;
    $('psub').textContent=sub;
    $('pm').classList.add('on');
    document.body.style.overflow='hidden';
    history.pushState({player:true},'');
    this._build(url,type,streamId);
  },

  _build(url,type,streamId) {
    this._destroyAll();
    const wrap=$('pwrap');

    /* Create video element */
    const vid = document.createElement('video');
    vid.id='vplayer';
    vid.setAttribute('playsinline','');
    vid.setAttribute('webkit-playsinline','');
    vid.setAttribute('x-webkit-airplay','allow');
    vid.controls=true;
    vid.preload='auto';
    vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;background:#000;object-fit:contain;';

    const bufEl=this._makeBuf();
    const errEl=this._makeErr(url,type,streamId);
    wrap.appendChild(vid);
    wrap.appendChild(bufEl);
    wrap.appendChild(errEl);

    this._showBuf(true);

    /* Decide playback strategy based on device */
    if (Device.useNativePlayer()) {
      /* iOS / Safari — native HLS support, just set src */
      this._playNative(vid,url,type,streamId);
    } else {
      /* Chrome / Firefox / Desktop — use HLS.js for m3u8, native for mp4 */
      const isM3U8 = /\.m3u8/.test(url) || type==='live';
      if (isM3U8 && typeof Hls!=='undefined' && Hls.isSupported()) {
        this._playHLS(vid,url,streamId);
      } else {
        this._playNative(vid,url,type,streamId);
      }
    }
  },

  _playNative(vid,url,type,streamId) {
    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
    vid.addEventListener('loadeddata',()=>this._showBuf(false));
    vid.addEventListener('error',()=>{
      if(url.endsWith('.m3u8') && streamId) {
        const tsUrl=API.live(streamId)+'.ts';
        vid.src=tsUrl; vid.load(); vid.play().catch(()=>{});
      } else {
        this._showBuf(false);
        this._showErr(true,vid.error?.message||'تعذّر تشغيل البث');
      }
    });
    vid.src=url; vid.load();
    vid.play().catch(()=>this._showBuf(false));
  },

  _playHLS(vid,url,streamId) {
    this._hls=new Hls({
      enableWorker:true,lowLatencyMode:true,
      backBufferLength:30,maxBufferLength:60,maxMaxBufferLength:120,
      fragLoadingTimeOut:20000,manifestLoadingTimeOut:15000,levelLoadingTimeOut:15000
    });
    this._hls.loadSource(url);
    this._hls.attachMedia(vid);
    this._hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      this._showBuf(false);
      vid.play().catch(()=>{});
    });
    this._hls.on(Hls.Events.ERROR,(_,d)=>{
      if(!d.fatal)return;
      if(d.type===Hls.ErrorTypes.NETWORK_ERROR && url.endsWith('.m3u8') && streamId) {
        const tsUrl=API.live(streamId)+'.ts';
        this._hls.destroy(); this._hls=null;
        this._hls=new Hls({enableWorker:true,lowLatencyMode:true});
        this._hls.loadSource(tsUrl);
        this._hls.attachMedia(vid);
      } else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) {
        this._hls.recoverMediaError();
      } else {
        this._showBuf(false);
        this._showErr(true,'تعذّر تشغيل البث: '+d.details);
      }
    });

    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
  },

  _makeBuf() {
    const d=document.createElement('div');
    d.className='bufov on'; d.id='bufov';
    d.innerHTML='<div class="buf-ring"></div><div class="buf-txt">جاري التحميل...</div>';
    return d;
  },
  _makeErr(url,type,streamId) {
    const d=document.createElement('div');
    d.className='errov'; d.id='errov';
    d.innerHTML=`<div class="err-ico">⚠️</div><div class="err-msg" id="ermsg">تعذّر تشغيل البث.</div>
      <button class="retry-btn" id="retryBtn">إعادة المحاولة</button>`;
    setTimeout(()=>{
      const rb=$('retryBtn');
      if(rb)rb.onclick=()=>{U.vibe(10);this._build(url,type,streamId)};
    },0);
    return d;
  },
  _showBuf(show){const el=$('bufov');if(el)el.classList.toggle('on',show)},
  _showErr(show,msg=''){
    const el=$('errov');if(el)el.classList.toggle('on',show);
    if(show&&msg){const m=$('ermsg');if(m)m.textContent=msg}
  },
  _destroyAll() {
    if(this._hls){try{this._hls.destroy()}catch(_){}this._hls=null}
    const wrap=$('pwrap');
    while(wrap.firstChild)wrap.removeChild(wrap.firstChild);
  },
  close() {
    U.vibe(8); this._destroyAll();
    $('pm').classList.remove('on');
    document.body.style.overflow='';
  }
};

/* ═══════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════ */
/* ═════════════════════════════════════════
   EVENTS SETUP WITH AUTO-LOAD
   ═════════════════════════════════════════ */
function setupEvents() {
  // استرجاع البيانات المحفوظة فور التشغيل
  const savedU = localStorage.getItem('totv_u');
  const savedP = localStorage.getItem('totv_p');
  
  if (savedU && savedP) {
    if($('uIn')) $('uIn').value = savedU;
    if($('pIn')) $('pIn').value = savedP;
  }

  // أحداث زر PIN
  $('pinBtn').onclick = () => Auth.checkPin();
  $('pinIn').onkeydown = e => { if(e.key === 'Enter') Auth.checkPin() };

  // زر الدخول مع حفظ البيانات
  $('lBtn').onclick = () => {
    localStorage.setItem('totv_u', $('uIn').value);
    localStorage.setItem('totv_p', $('pIn').value);
    Auth.login();
  };

  $('uIn').onkeydown = e => { if(e.key === 'Enter') $('pIn').focus() };
  $('pIn').onkeydown = e => { 
    if(e.key === 'Enter') {
      localStorage.setItem('totv_u', $('uIn').value);
      localStorage.setItem('totv_p', $('pIn').value);
      Auth.login();
    }
  };

  // تسجيل الخروج ومسح الذاكرة
  $('logoutBtn').onclick = () => {
    localStorage.removeItem('totv_u');
    localStorage.removeItem('totv_p');
    Auth.logout();
  };

  // باقي الأحداث الأصلية (لا تقم بتغييرها)
  $('closePBtn').onclick = () => Player.close();
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => App.switchTab(t.dataset.t)));

  window.addEventListener('popstate', () => {
    if($('pm').classList.contains('on')) Player.close();
  });
  
  /* منع السحب للتحديث في iOS */
  let _ty=0;
  document.addEventListener('touchstart', e => { _ty = e.touches[0].pageY }, {passive:true});
  document.addEventListener('touchmove', e => {
    const ab = document.querySelector('.abody');
    if(ab && ab.scrollTop === 0 && e.touches[0].pageY > _ty) e.preventDefault();
  }, {passive:false});
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
window.addEventListener('load',()=>{
  setupEvents();
  setTimeout(()=>{
    $('splash').classList.add('hide');
    $('lockScreen').classList.add('on');
    $('pinIn').focus();
  },1600);
});
