  <script>
    // إجبار المتصفح على بيئة HTTP لضمان عمل سيرفر 2052
    if (location.protocol === 'https:' && !location.hostname.includes('localhost')) {
        location.replace(location.href.replace('https:', 'http:'));
    }
    
    // تعريف دالة الاختصار لضمان استقرار الكود الأصلي
    const $ = id => document.getElementById(id);

    // استرجاع بيانات الدخول فور تشغيل التطبيق
    window.addEventListener('DOMContentLoaded', () => {
        const savedU = localStorage.getItem('totv_u');
        const savedP = localStorage.getItem('totv_p');
        if (savedU && savedP) {
            if($('uIn')) $('uIn').value = savedU;
            if($('pIn')) $('pIn').value = savedP;
        }
    });
  </script>

<style>
/* يبدأ الـ CSS الخاص بك هنا دون تغيير */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
--accent:#E50914;--accent-d:#B20710;--accent-l:#FF1926;
--gold:#C6A84A;--bg:#141414;--s1:#181818;--s2:#222;--s3:#2a2a2a;

html{-webkit-text-size-adjust:100%;height:100%;overflow:hidden}
body{font-family:'Tajawal','Segoe UI',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100%;position:fixed;width:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

.sp-bar-wrap{width:140px;height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sp-bar{width:0;height:100%;background:var(--accent);border-radius:3px;animation:spLoad 1.5s ease forwards}
@keyframes spLoad{to{width:100%}}
.sp-txt{font-size:.78rem;color:var(--dimmer)}

.screen{display:none;min-height:100svh;align-items:center;justify-content:center;padding:20px;position:fixed;inset:0;z-index:100}
.screen.on{display:flex}
#lockScreen{background:#000;background-image:radial-gradient(ellipse at 50% 0%,rgba(229,9,20,.1) 0%,transparent 55%);padding-top:var(--st);padding-bottom:var(--sb)}
.lk-card{background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.07);border-radius:var(--r3);padding:44px 34px;width:100%;max-width:400px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);animation:cardUp .45s cubic-bezier(.16,1,.3,1)}

.lk-brand{text-align:center;margin-bottom:30px}
.lk-brand svg{margin:0 auto 12px;display:block}
.lk-brand h1{font-size:1.6rem;font-weight:900;letter-spacing:3px}
.lk-brand p{font-size:.82rem;color:var(--dim);margin-top:5px}
.lk-field{position:relative;margin-bottom:14px}
.lk-field input{width:100%;background:var(--s3);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:15px 16px 15px 44px;color:var(--txt);font-size:1rem;font-family:'Tajawal',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none}
.lk-field input:focus{border-color:var(--accent);background:rgba(42,42,42,.9)}
.lk-field input::placeholder{color:var(--dimmer)}
.lk-field .fi{position:absolute;top:50%;right:14px;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.45}
.lk-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:1rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;margin-top:6px}
.lk-btn:active{background:var(--accent-d);transform:scale(.98)}
.lk-btn:disabled{opacity:.5;cursor:wait}
.lk-err{background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.25);border-radius:var(--r);padding:11px 14px;font-size:.82rem;color:var(--accent-l);text-align:center;margin-top:12px;display:none;animation:shake .35s}
.lk-err.on{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.lk-status{font-size:.72rem;color:var(--dim);text-align:center;margin-top:10px;min-height:18px}

#app{display:none;flex-direction:column;height:100vh;height:100svh;position:fixed;inset:0;background:var(--bg)}
#app.on{display:flex}
.anav{background:rgba(20,20,20,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px;padding-top:calc(var(--st)+10px);display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04);z-index:50}

.hero-badge{background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:3px}

.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:all .3s}

.tmdb-card .tc-y{font-size:.6rem;color:var(--dim)}

.cat-row:active{background:rgba(229,9,20,.07);transform:translateX(-2px)}
.cr-ico{font-size:1.15rem;flex-shrink:0}.cr-name{flex:1;font-size:.88rem;font-weight:600;color:var(--txt2)}.cr-arr{color:var(--dimmer);font-size:.95rem}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:0 14px}
.ch-card{background:var(--s1);border:1px solid rgba(255,255,255,.03);border-radius:var(--r2);padding:14px 8px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:all .22s}

.ldr{display:flex;flex-direction:column;align-items:center;gap:12px;padding:55px 20px}

.mpty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:55px 20px;text-align:center}

.mpty-txt{font-size:.82rem;color:var(--dim);line-height:1.7;white-space:pre-line;max-width:260px}
.pmoda{display:none;position:fixed;inset:0;background:#000;z-index:2000;flex-direction:column}
.pmoda.on{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ptop{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(var(--st)+10px);background:linear-gradient(180deg,rgba(0,0,0,.95) 0%,transparent 100%);position:absolute;top:0;left:0;right:0;z-index:20}
.pbk{width:38px;height:38px;border-radius:50%;background:rgba(30,30,30,.9);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.pbk:active{background:rgba(229,9,20,.3);border-color:var(--accent);transform:scale(.94)}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:.68rem;color:var(--dim);margin-top:2px}
.pwrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
.bufov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:15;pointer-events:none}
.bufov.on{display:flex}
.buf-ring{width:44px;height:44px;border:3px solid rgba(229,9,20,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.buf-txt{font-size:.78rem;color:rgba(255,255,255,.55)}
.errov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.95);z-index:16;text-align:center;padding:24px}
.errov.on{display:flex}
.err-ico{font-size:2.6rem}.err-msg{font-size:.82rem;color:var(--dim);line-height:1.7;max-width:260px}
.retry-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:11px 28px;font-size:.86rem;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s}

</style>

/* ═══════════════════════════════════════════════════════════
   SMART PROTOCOL BRIDGE
   ═══════════════════════════════════════════════════════════
   This is the core innovation. When running on HTTPS,
   the browser blocks direct HTTP requests. This bridge:
   
   1. Detects protocol (HTTP vs HTTPS)
   2. On HTTP → direct requests (fast, no proxy)
   3. On HTTPS → routes through CORS proxy services
   4. For VIDEO on HTTPS → fetches as blob then creates
      blob:// URL which bypasses mixed content
   5. Multiple proxy fallbacks for reliability
═══════════════════════════════════════════════════════════ */
const Bridge={
  isSecure: location.protocol==='https:',
  _proxyIdx: 0,
  _workingProxy: null,

  /* Build the raw HTTP url to the IPTV server */
  rawUrl(path){
    return `http://${CFG.HOST}:${CFG.PORT}${path}`;
  },

  /* API endpoint URL */
  apiUrl(action,extra=''){
    return this.rawUrl(`/player_api.php?username=${CFG.USERNAME}&password=${CFG.PASSWORD}&action=${action}${extra}`);
  },

  /* Stream URLs */
  liveUrl(id){ return this.rawUrl(`/live/${CFG.USERNAME}/${CFG.PASSWORD}/${id}`); },
  vodUrl(id){ return this.rawUrl(`/movie/${CFG.USERNAME}/${CFG.PASSWORD}/${id}.mp4`); },
  epUrl(id,ext){ return this.rawUrl(`/series/${CFG.USERNAME}/${CFG.PASSWORD}/${id}.${ext||'mp4'}`); },

  /* Wrap URL through proxy if on HTTPS */
  proxyWrap(url){
    if(!this.isSecure) return url;
    if(this._workingProxy!==null){
      return this._workingProxy + encodeURIComponent(url);
    }
    return CFG.PROXIES[this._proxyIdx % CFG.PROXIES.length] + encodeURIComponent(url);
  },

  /* Fetch JSON data — works on both HTTP and HTTPS */
  async fetchJSON(url, retries=CFG.RETRIES){
    /* On HTTP: direct fetch */
    if(!this.isSecure){
      return this._directFetch(url, retries);
    }

    /* On HTTPS: try each proxy until one works */
    for(let p=0; p<CFG.PROXIES.length; p++){
      const proxy = CFG.PROXIES[(this._proxyIdx + p) % CFG.PROXIES.length];
      const proxiedUrl = proxy + encodeURIComponent(url);
      try{
        const result = await this._directFetch(proxiedUrl, 1);
        /* This proxy works! Remember it */
        this._workingProxy = proxy;
        this._proxyIdx = (this._proxyIdx + p) % CFG.PROXIES.length;
        return result;
      }catch(e){
        console.warn(`[Bridge] Proxy ${p+1} failed:`, e.message);
        continue;
      }
    }
    throw new Error('All proxies failed');
  },

  async _directFetch(url, retries){
    let last;
    for(let i=0;i<retries;i++){
      try{
        const ctrl=new AbortController();
        const tid=setTimeout(()=>ctrl.abort(),CFG.TIMEOUT);
        const res=await fetch(url,{signal:ctrl.signal,cache:'no-store'});
        clearTimeout(tid);
        if(!res.ok) throw new Error('HTTP '+res.status);
        const txt=await res.text();
        try{return JSON.parse(txt)}catch(_){return txt}
      }catch(e){
        last=e;
        if(i<retries-1) await sleep(CFG.RETRY_DELAY);
      }
    }
    throw last;
  },

  /* Get a playable video URL
     On HTTP: return direct URL
     On HTTPS for HLS: return proxied m3u8 URL
     On HTTPS for MP4: we let the player handle it via proxy */
  getPlayableUrl(url){
    if(!this.isSecure) return url;
    /* For HTTPS, proxy the URL */
    return this.proxyWrap(url);
  },

  /* For HLS on HTTPS: we need a custom loader */
  getHLSConfig(){
    if(!this.isSecure) return {};
    const proxy = this._workingProxy || CFG.PROXIES[0];
    return {
      xhrSetup: function(xhr, url){
        /* If the URL is already proxied or is HTTPS, leave it */
        if(url.startsWith('https://')) return;
        /* Proxy HTTP URLs (segments, keys, etc) */
        const proxied = proxy + encodeURIComponent(url);
        xhr.open('GET', proxied, true);
      }
    };
  }
};

    vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;background:#000;object-fit:contain;';
    const buf=this._makeBuf();const err=this._makeErr(url,type,sid);
    wrap.appendChild(vid);wrap.appendChild(buf);wrap.appendChild(err);
    this._showBuf(true);

    const isLive=type==='live'||/\.m3u8/i.test(url);
    const playUrl=Bridge.getPlayableUrl(url);

    if(isLive){
      /* HLS stream */
      if(Device.useNativePlayer()){
        /* iOS/Safari: native HLS — just set src (proxied if HTTPS) */
        this._playNative(vid,playUrl,type,sid);
      }else if(typeof Hls!=='undefined'&&Hls.isSupported()){
        /* Desktop Chrome/FF: HLS.js with proxy config */
        this._playHLS(vid,url,sid);
      }else{
        this._playNative(vid,playUrl,type,sid);
      }
    }else{
      /* VOD mp4 — native player with proxied URL */
      this._playNative(vid,playUrl,type,sid);
    }
  },

  _playNative(vid,url,type,sid){
    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
    vid.addEventListener('loadeddata',()=>this._showBuf(false));
    vid.addEventListener('error',()=>{
      /* Fallback: try .ts for live */
      if(S.curUrl.endsWith('.m3u8')&&sid){
        const ts=Bridge.getPlayableUrl(Bridge.liveUrl(sid)+'.ts');
        vid.src=ts;vid.load();vid.play().catch(()=>{});
      }else{
        this._showBuf(false);
        this._showErr(true,'تعذّر تشغيل المحتوى. تأكد من الاتصال');
      }
    });
    vid.src=url;vid.load();vid.play().catch(()=>this._showBuf(false));
  },

  _playHLS(vid,rawUrl,sid){
    /* For HTTPS: configure HLS.js to proxy all HTTP requests */
    const hlsCfg=Object.assign({
      enableWorker:true,lowLatencyMode:true,
      backBufferLength:30,maxBufferLength:60,maxMaxBufferLength:120,
      fragLoadingTimeOut:20000,manifestLoadingTimeOut:15000,levelLoadingTimeOut:15000
    },Bridge.getHLSConfig());

    const manifestUrl=Bridge.getPlayableUrl(rawUrl);
    
    this._hls=new Hls(hlsCfg);
    this._hls.loadSource(manifestUrl);
    this._hls.attachMedia(vid);
    this._hls.on(Hls.Events.MANIFEST_PARSED,()=>{this._showBuf(false);vid.play().catch(()=>{})});
    this._hls.on(Hls.Events.ERROR,(_,d)=>{
      if(!d.fatal)return;
      if(d.type===Hls.ErrorTypes.NETWORK_ERROR&&sid){
        const ts=Bridge.getPlayableUrl(Bridge.liveUrl(sid)+'.ts');
        this._hls.destroy();this._hls=null;
        vid.src=ts;vid.load();vid.play().catch(()=>{});
      }else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
        this._hls.recoverMediaError();
      }else{
        this._showBuf(false);this._showErr(true,'تعذّر تشغيل البث');
      }
    });
    vid.addEventListener('waiting',()=>this._showBuf(true));
    vid.addEventListener('playing',()=>this._showBuf(false));
    vid.addEventListener('canplay',()=>this._showBuf(false));
  },

  _makeBuf(){const d=document.createElement('div');d.className='bufov on';d.id='bufov';d.innerHTML='<div class="buf-ring"></div><div class="buf-txt">جاري التحميل...</div>';return d},
  _makeErr(url,type,sid){const d=document.createElement('div');d.className='errov';d.id='errov';d.innerHTML=`<div class="err-ico">⚠️</div><div class="err-msg" id="ermsg">تعذّر التشغيل</div><button class="retry-btn" id="retryBtn">إعادة المحاولة</button>`;setTimeout(()=>{const r=$('retryBtn');if(r)r.onclick=()=>{U.vibe(10);this._build(url,type,sid)}},0);return d},
  _showBuf(s){const el=$('bufov');if(el)el.classList.toggle('on',s)},
  _showErr(s,m=''){const el=$('errov');if(el)el.classList.toggle('on',s);if(s&&m){const x=$('ermsg');if(x)x.textContent=m}},
  _destroyAll(){if(this._hls){try{this._hls.destroy()}catch(_){}this._hls=null}const w=$('pwrap');while(w.firstChild)w.removeChild(w.firstChild)},
  close(){U.vibe(8);this._destroyAll();$('pm').classList.remove('on');document.body.style.overflow=''}
};

function setupEvents(){
  $('pinBtn').onclick=()=>Auth.checkPin();
  $('pinIn').onkeydown=e=>{if(e.key==='Enter')Auth.checkPin()};
  $('logoutBtn').onclick=()=>Auth.logout();
  $('closePBtn').onclick=()=>Player.close();
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>App.switchTab(t.dataset.t)));
  window.addEventListener('popstate',()=>{if($('pm').classList.contains('on'))Player.close()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')Player.close()});
  let ty=0;
  document.addEventListener('touchstart',e=>{ty=e.touches[0].pageY},{passive:true});
  document.addEventListener('touchmove',e=>{const a=document.querySelector('.abody');if(a&&a.scrollTop===0&&e.touches[0].pageY>ty)e.preventDefault()},{passive:false});
  document.addEventListener('contextmenu',e=>{if(e.target.matches('video,.ch-card,.vod-card'))e.preventDefault()});
}

window.addEventListener('load',async()=>{
  setupEvents();
  console.log(`[TOTV+] Protocol: ${location.protocol} | Secure mode: ${Bridge.isSecure}`);
  const ok=await Auth.autoLogin();
  setTimeout(()=>{$('splash').classList.add('hide');if(ok)App.boot();else{$('lockScreen').classList.add('on');$('pinIn').focus()}},1500);
});
</script>
